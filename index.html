<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jacket Orders — Class of 09</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --card: #13131f;
  --border: #1e1e30;
  --border-light: #2a2a40;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: rgba(201,168,76,0.12);
  --text: #e4e4f0;
  --text-dim: #8888aa;
  --text-faint: #44445a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.03;pointer-events:none}

/* HERO */
.hero{position:relative;z-index:1;padding:5rem 2rem 3rem;text-align:center;border-bottom:1px solid var(--border);overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(201,168,76,.07) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:1.4rem;opacity:0;animation:fadeUp .7s .1s ease forwards}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,13vw,9rem);line-height:.88;letter-spacing:.04em;color:#fff;margin-bottom:.2em;opacity:0;animation:fadeUp .8s .2s ease forwards}
.hero-title span{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(201,168,76,.5))}
.hero-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,2.5vw,1.35rem);color:var(--text-dim);margin-bottom:3rem;opacity:0;animation:fadeUp .8s .35s ease forwards}
.stats-bar{display:inline-flex;gap:0;border:1px solid var(--border-light);border-radius:16px;overflow:hidden;opacity:0;animation:fadeUp .8s .5s ease forwards}
.stat-item{padding:1rem 2rem;text-align:center;border-right:1px solid var(--border-light)}
.stat-item:last-child{border-right:none}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--gold);line-height:1;display:block}
.stat-label{font-size:.7rem;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;display:block;margin-top:.2rem}
@media(max-width:500px){.stats-bar{flex-direction:column}.stat-item{border-right:none;border-bottom:1px solid var(--border-light)}.stat-item:last-child{border-bottom:none}}

/* CONTROLS */
.controls{position:sticky;top:0;z-index:50;background:rgba(8,8,16,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:.9rem;pointer-events:none}
.search-input{width:100%;background:var(--card);border:1px solid var(--border-light);border-radius:10px;padding:.7rem 1rem .7rem 2.6rem;font-family:'Syne',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color .25s,box-shadow .25s}
.search-input::placeholder{color:var(--text-faint)}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.filter-group{display:flex;gap:.5rem;flex-wrap:wrap}
.filter-btn{background:var(--card);border:1px solid var(--border-light);border-radius:8px;padding:.55rem 1rem;font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.08em;color:var(--text-dim);cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover{border-color:var(--gold);color:var(--gold-light)}
.filter-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light)}
.count-badge{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text-dim);margin-left:auto;white-space:nowrap;padding:.4rem .8rem;background:var(--surface);border:1px solid var(--border);border-radius:6px}

/* GRID */
.grid-wrapper{position:relative;z-index:1;padding:2rem;max-width:1400px;margin:0 auto}
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.2rem}
@media(max-width:420px){.orders-grid{grid-template-columns:1fr}}

/* ORDER CARD */
.order-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer;transition:transform .3s cubic-bezier(.23,1,.32,1),border-color .3s,box-shadow .3s;animation:cardIn .5s cubic-bezier(.23,1,.32,1) both;position:relative}
.order-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent 60%);opacity:0;transition:opacity .3s}
.order-card:hover{transform:translateY(-5px);border-color:var(--border-light);box-shadow:0 20px 50px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.08)}
.order-card:hover::before{opacity:1}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.card-head{padding:1.4rem 1.4rem 1rem;display:flex;align-items:flex-start;gap:1rem;border-bottom:1px solid var(--border)}
.card-avatar{width:46px;height:46px;border-radius:12px;background:var(--gold-dim);border:1px solid rgba(201,168,76,.25);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:var(--gold);flex-shrink:0;letter-spacing:.05em}
.card-head-info{flex:1;min-width:0}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.06em;color:#fff;line-height:1;margin-bottom:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.badge-patches{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;background:var(--gold-dim);border:1px solid rgba(201,168,76,.3);color:var(--gold-light);border-radius:6px;padding:.2rem .6rem}
.badge-date{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--text-faint)}
.card-order-num{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--border-light);line-height:1;letter-spacing:-.02em;margin-left:auto;flex-shrink:0;transition:color .3s}
.order-card:hover .card-order-num{color:rgba(201,168,76,.15)}

.card-body{padding:1.1rem 1.4rem}
.section-label{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.2em;color:var(--text-faint);text-transform:uppercase;margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.placement-text{font-size:.85rem;color:var(--text-dim);line-height:1.6;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.quote-block{background:var(--surface);border-left:2px solid var(--gold);border-radius:0 10px 10px 0;padding:.75rem 1rem;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:var(--text);line-height:1.65;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

.links-row{display:flex;gap:.4rem;flex-wrap:wrap;padding:.8rem 1.4rem;border-top:1px solid var(--border)}
.link-chip{display:inline-flex;align-items:center;gap:.3rem;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.05em;color:var(--text-dim);background:var(--surface);border:1px solid var(--border-light);border-radius:6px;padding:.3rem .6rem;text-decoration:none;transition:border-color .2s,color .2s,background .2s}
.link-chip:hover{border-color:var(--gold);color:var(--gold-light);background:var(--gold-dim)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(4,4,12,.92);backdrop-filter:blur(16px);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border:1px solid var(--border-light);border-radius:24px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;animation:modalIn .35s cubic-bezier(.23,1,.32,1);position:relative;scrollbar-width:thin;scrollbar-color:var(--border-light) transparent}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-close{position:sticky;top:1rem;float:right;margin:1rem 1rem 0 0;width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--border-light);color:var(--text-dim);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;z-index:10}
.modal-close:hover{background:#ff4444;color:#fff;border-color:#ff4444}
.modal-header{padding:2rem 2rem 1.5rem;border-bottom:1px solid var(--border)}
.modal-order-num{font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.25em;color:var(--gold);opacity:.7;margin-bottom:.5rem}
.modal-name{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:.05em;color:#fff;line-height:1;margin-bottom:.6rem}
.modal-body{padding:1.5rem 2rem}
.modal-section{margin-bottom:1.8rem}
.modal-section-title{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.modal-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.modal-text{font-size:.92rem;color:var(--text-dim);line-height:1.75;white-space:pre-wrap}
.modal-quote{background:var(--surface);border:1px solid rgba(201,168,76,.2);border-left:3px solid var(--gold);border-radius:0 12px 12px 0;padding:1.2rem 1.4rem;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.15rem;color:var(--text);line-height:1.75;white-space:pre-wrap}
.modal-links{display:flex;flex-wrap:wrap;gap:.5rem}
.modal-link{display:inline-flex;align-items:center;gap:.4rem;background:var(--surface);border:1px solid var(--border-light);border-radius:8px;padding:.5rem .9rem;font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.05em;color:var(--text-dim);text-decoration:none;transition:all .2s}
.modal-link:hover{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light)}

/* EMPTY */
.empty-state{text-align:center;padding:5rem 2rem;color:var(--text-dim);display:none}
.empty-state .big{font-family:'Bebas Neue',sans-serif;font-size:4rem;color:var(--border-light);margin-bottom:1rem}
.empty-state p{font-size:.95rem}

/* FOOTER */
.footer{position:relative;z-index:1;text-align:center;padding:2rem;border-top:1px solid var(--border);font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.12em;color:var(--text-faint)}
.footer span{color:var(--gold)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-eyebrow">Class of 2026 · Jacket Orders</div>
  <h1 class="hero-title">ORDER<br><span>VAULT</span></h1>
  <p class="hero-sub">Every patch. Every quote. Every story.</p>
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-num" id="total-count">0</span><span class="stat-label">Orders</span></div>
    <div class="stat-item"><span class="stat-num" id="total-patches">0</span><span class="stat-label">Total Patches</span></div>
    <div class="stat-item"><span class="stat-num">Feb</span><span class="stat-label">Period</span></div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" type="text" placeholder="Search by name, quote, placement…" oninput="filterOrders(this.value)"/>
  </div>
  <div class="filter-group">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('1',this)">1 Patch</button>
    <button class="filter-btn" onclick="setFilter('2',this)">2 Patches</button>
    <button class="filter-btn" onclick="setFilter('3',this)">3 Patches</button>
    <button class="filter-btn" onclick="setFilter('4',this)">4 Patches</button>
    <button class="filter-btn" onclick="setFilter('5+',this)">5+ Patches</button>
  </div>
  <div class="count-badge" id="count-badge">— orders</div>
</div>

<div class="grid-wrapper">
  <div class="orders-grid" id="orders-grid"></div>
  <div class="empty-state" id="empty-state">
    <div class="big">404</div>
    <p>No orders match your search.</p>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header" id="modal-header"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<footer class="footer"><span>ORDER VAULT</span> · Class of 2026 · All rights reserved</footer>

<script>
const ORDERS=[{name:"Atallah Wahbeh",date:"17/02/2026",patches:4,links:["https://drive.google.com/open?id=19IbkftQKlDWS3wt3dWiW_Xr75dhjvgJL","https://drive.google.com/open?id=1U7RKOAJYKnR9YfnYEmoZdeNtdn9qWhdu","https://drive.google.com/open?id=1oW__CY3lzjGAvI9k9Q0RmHS9o_bLTGC9","https://drive.google.com/open?id=1EzXVE_yS1Y60LUaeG1hy-c_vhp4gciHj"],placement:"Right hand: Aston Martin and under it fire. Left hand: hammer and under it 'c'est la vie'.",quote:"I don't need luck to perform…\nI decide when to perform good."},{name:"Lamar",date:"18/02/2026",patches:4,links:["https://drive.google.com/open?id=1OYwKbUuqwgXUyi4bIVmpGNsGiWb1-Sn1","https://drive.google.com/open?id=1AhAbRvWQREL8e0rt2gVanqzQuZWJ71VE","https://drive.google.com/open?id=17omWFoTTf9Vdp7akvf23RfxtNvIVttnS","https://drive.google.com/open?id=19Yrg4jB4drKbXS87iE4P3nyYr4dyRJXa"],placement:"The moon up, the magic shop underneath it, on the right arm. 1 piece patches on left arm.",quote:"قَالُوا سُبْحَانَكَ لَا عِلْمَ لَنَا إِلَّا مَا عَلَّمْتَنَا ۖ إِنَّكَ أَنتَ الْعَلِيمُ الْحَكِيمُ"},{name:"Abdullah Moayad",date:"18/02/2026",patches:2,links:["https://drive.google.com/open?id=1yzk7PuqqqMGC4AJAoFRrwpbixysXONQl","https://drive.google.com/open?id=1DQekYV497fw_Hw-XrcDIPJ1kDsKYNyzB"],placement:"Right",quote:"Error 404: Failure not found."},{name:"Omar Aburadaha",date:"18/02/2026",patches:3,links:["https://drive.google.com/open?id=1SwcXip8b_bfizfKUxwMGOfMZZDQg9K-V","https://drive.google.com/open?id=1erRj0Z6Gkuj9NrjwoIcnD7WgW4x5ytjQ","https://drive.google.com/open?id=17VzNv40_ooSX_r-oghn2LN7H7QtHTFKp"],placement:"Porsche on the left arm. 'Out of Luck' above 'Money' on the right.",quote:"Sometimes you will never know the value of a moment, until it becomes a memory."},{name:"Yousef AlHaj Qasem",date:"18/02/2026",patches:4,links:["https://drive.google.com/open?id=1IBN5q_2V46_tpZ7z_-pUUR-ddG9S8P_h","https://drive.google.com/open?id=1OiViyQ-HkyV-GY4ItUr2wlL15IknpNwz","https://drive.google.com/open?id=1laK1InTHgVup-kISD let currentFilter='all',currentSearch='',visibleOrders=[...ORDERS];

function init(){
  document.getElementById('total-count').textContent=ORDERS.length;
  const tot=ORDERS.reduce((s,o)=>s+(parseInt(o.patches)||0),0);
  document.getElementById('total-patches').textContent=tot;
  renderGrid(ORDERS);
  document.getElementById('count-badge').textContent=ORDERS.length+' orders';
}

function getInitials(n){return n.trim().split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}

function setFilter(val,btn){
  currentFilter=val;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  apply();
}

function filterOrders(q){currentSearch=q.toLowerCase();apply();}

function apply(){
  visibleOrders=ORDERS.filter(o=>{
    const p=parseInt(o.patches)||0;
    if(currentFilter!=='all'){
      if(currentFilter==='5+'&&p<5)return false;
      if(currentFilter!=='5+'&&p!==parseInt(currentFilter))return false;
    }
    if(currentSearch){
      const h=`${o.name} ${o.quote} ${o.placement} ${o.date}`.toLowerCase();
      if(!h.includes(currentSearch))return false;
    }
    return true;
  });
  renderGrid(visibleOrders);
  document.getElementById('count-badge').textContent=`${visibleOrders.length} of ${ORDERS.length} orders`;
}

function renderGrid(orders){
  const grid=document.getElementById('orders-grid');
  const empty=document.getElementById('empty-state');
  if(!orders.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=orders.map((o,i)=>{
    const links=o.links.filter(l=>l&&l.startsWith('http'));
    const chips=links.slice(0,4).map((l,li)=>`<a class="link-chip" href="${l}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 File ${li+1}</a>`).join('');
    const more=links.length>4?`<span class="link-chip">+${links.length-4} more</span>`:'';
    return `<div class="order-card" onclick="openModal(${i})" style="animation-delay:${Math.min(i*.04,.5)}s">
      <div class="card-head">
        <div class="card-avatar">${getInitials(o.name)}</div>
        <div class="card-head-info">
          <div class="card-name" title="${o.name}">${o.name}</div>
          <div class="card-meta">
            <span class="badge-patches">${o.patches} patch${o.patches==1?'':'es'}</span>
            <span class="badge-date">${o.date}</span>
          </div>
        </div>
        <div class="card-order-num">${String(ORDERS.indexOf(o)+1).padStart(2,'0')}</div>
      </div>
      <div class="card-body">
        ${o.placement?`<div class="section-label">Placement</div><div class="placement-text">${o.placement}</div>`:''}
        ${o.quote?`<div class="quote-block">${o.quote}</div>`:''}
      </div>
      ${links.length?`<div class="links-row">${chips}${more}</div>`:''}
    </div>`;
  }).join('');
}

function openModal(idx){
  const o=visibleOrders[idx];
  if(!o)return;
  const gi=ORDERS.indexOf(o);
  const links=o.links.filter(l=>l&&l.startsWith('http'));
  document.getElementById('modal-header').innerHTML=`
    <div class="modal-order-num">ORDER #${String(gi+1).padStart(2,'0')} · ${o.date}</div>
    <div class="modal-name">${o.name}</div>
    <div class="card-meta"><span class="badge-patches">${o.patches} patch${o.patches==1?'':'es'}</span></div>`;
  let body='';
  if(o.placement)body+=`<div class="modal-section"><div class="modal-section-title">Placement Instructions</div><div class="modal-text">${o.placement}</div></div>`;
  if(o.quote)body+=`<div class="modal-section"><div class="modal-section-title">Quote</div><div class="modal-quote">${o.quote}</div></div>`;
  if(links.length)body+=`<div class="modal-section"><div class="modal-section-title">Reference Files (${links.length})</div><div class="modal-links">${links.map((l,i)=>`<a class="modal-link" href="${l}" target="_blank" rel="noopener">🔗 File ${i+1}</a>`).join('')}</div></div>`;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function handleOverlayClick(e){if(e.target===document.getElementById('modal'))closeModal();}
function closeModal(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
init();
</script>
