<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHITBOX - Watch Together</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #030712;
            --bg-card: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-cyan: #06b6d4;
            --accent-violet: #8b5cf6;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --accent-pink: #ec4899;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --glow-cyan: rgba(6, 182, 212, 0.4);
            --glow-violet: rgba(139, 92, 246, 0.4);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .gradient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, transparent 70%);
            top: -200px;
            left: -200px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
            animation-delay: -10s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(30px, -30px);
            }

            50% {
                transform: translate(-20px, 20px);
            }

            75% {
                transform: translate(20px, 30px);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        .app-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 480px;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: screenIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes screenIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes screenOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.96);
            }
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.8) 0%, rgba(17, 24, 39, 0.6) 100%);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(255, 255, 255, 0.05) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            pointer-events: none;
        }

        #welcome-screen.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-content {
            width: 100%;
            padding: 48px 36px;
            text-align: center;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .logo-glow {
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, var(--glow-cyan) 0%, transparent 70%);
            filter: blur(20px);
            animation: glowBreath 3s ease-in-out infinite;
        }

        @keyframes glowBreath {

            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.1);
            }
        }

        .logo-icon {
            position: relative;
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(139, 92, 246, 0.2));
            border: 1px solid rgba(6, 182, 212, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-cyan);
            margin: 0 auto 16px;
            box-shadow: 0 0 40px var(--glow-cyan);
        }

        .logo-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 50%, #06b6d4 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 3s linear infinite;
        }

        @keyframes gradientFlow {
            to {
                background-position: 200% center;
            }
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 32px;
            border-radius: 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn:hover::before {
            transform: translateX(100%);
        }

        .btn-primary {
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 4px 24px rgba(6, 182, 212, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(6, 182, 212, 0.4), 0 0 0 4px rgba(6, 182, 212, 0.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(6, 182, 212, 0.4);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
        }

        .btn-small {
            padding: 10px 18px;
            font-size: 13px;
        }

        .btn-amber {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
        }

        .btn-amber:hover {
            box-shadow: 0 8px 30px rgba(245, 158, 11, 0.4);
        }

        .full-width {
            width: 100%;
        }

        .screen:not(#welcome-screen) {
            justify-content: center;
        }

        .modal-card {
            width: 100%;
            padding: 36px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            transform: scale(1.1);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .modal-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
        }

        .modal-icon::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 28px;
            background: inherit;
            filter: blur(16px);
            opacity: 0.5;
            z-index: -1;
        }

        .create-icon {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(139, 92, 246, 0.2));
            border: 1px solid rgba(6, 182, 212, 0.3);
            color: var(--accent-cyan);
        }

        .join-icon {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: var(--accent-violet);
        }

        .success-icon {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(6, 182, 212, 0.2));
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--accent-emerald);
        }

        .modal-header h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1), 0 0 20px rgba(6, 182, 212, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .code-input {
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 12px;
            text-align: center;
            font-size: 22px !important;
            font-weight: 700;
            text-transform: uppercase;
        }

        .room-code-box {
            text-align: center;
            padding: 32px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        .room-code-box::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.05), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .code-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .code-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 12px;
            color: var(--accent-cyan);
            text-shadow: 0 0 40px var(--glow-cyan);
            margin-bottom: 20px;
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            color: var(--accent-cyan);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: rgba(6, 182, 212, 0.2);
            transform: scale(1.05);
        }

        .copy-btn.copied {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.4);
            color: var(--accent-emerald);
        }

        /* Room Screen (Video) */
        #room-screen.active {
            max-width: 900px;
        }

        .room-main {
            width: 100%;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .room-info-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .room-code-badge {
            padding: 8px 16px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-cyan);
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            font-size: 13px;
        }

        .user-badge.host {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(6, 182, 212, 0.15));
            border-color: rgba(139, 92, 246, 0.4);
            color: var(--accent-violet);
        }

        .video-section {
            padding: 24px;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.6));
        }

        .video-placeholder svg {
            width: 64px;
            height: 64px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .video-placeholder p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .link-input-section {
            margin-bottom: 20px;
        }

        .link-input-group {
            display: flex;
            gap: 10px;
        }

        .link-input-group input {
            flex: 1;
        }

        .link-input-group .btn {
            white-space: nowrap;
        }

        .participants-sidebar {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        .participants-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .participants-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .participants-header span {
            color: var(--accent-cyan);
            font-weight: 700;
        }

        .participants-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .participant-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .participant-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .participant-name {
            font-weight: 600;
            font-size: 14px;
            flex: 1;
        }

        .participant-role {
            font-size: 10px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .participant-role.host {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(6, 182, 212, 0.2));
            color: var(--accent-violet);
        }

        .participant-role.viewer {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
        }

        .room-actions {
            display: flex;
            justify-content: center;
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }

        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--accent-cyan);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: particleFloat 15s infinite;
            opacity: 0.3;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.3;
            }

            90% {
                opacity: 0.3;
            }

            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            40% {
                transform: translateX(8px);
            }

            60% {
                transform: translateX(-8px);
            }

            80% {
                transform: translateX(8px);
            }
        }

        @media (max-width: 768px) {
            .room-header {
                flex-direction: column;
                gap: 12px;
            }

            .link-input-group {
                flex-direction: column;
            }

            .link-input-group .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
    <div id="particles"></div>

    <div class="app-container">
        <!-- Welcome Screen -->
        <div id="welcome-screen" class="screen active">
            <div class="glass-card welcome-content">
                <div class="logo-wrapper">
                    <div class="logo-glow"></div>
                    <div class="logo-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        </svg>
                    </div>
                </div>
                <h1 class="logo-text">SHITBOX</h1>
                <p class="tagline">Watch videos together in real-time</p>

                <div class="action-buttons">
                    <button id="create-room-btn" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14" />
                        </svg>
                        Create Room
                    </button>
                    <button id="join-room-btn" class="btn btn-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" />
                        </svg>
                        Join Room
                    </button>
                </div>
            </div>
        </div>

        <!-- Create Room Screen -->
        <div id="create-room-screen" class="screen">
            <div class="glass-card modal-card">
                <button class="back-btn" id="back-from-create">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7" />
                    </svg>
                </button>

                <div class="modal-header">
                    <div class="modal-icon create-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14" />
                        </svg>
                    </div>
                    <h2>Create New Room</h2>
                    <p>Start a watching session</p>
                </div>

                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="create-name" placeholder="Enter your name..." maxlength="20">
                </div>

                <button id="generate-room-btn" class="btn btn-primary full-width">

                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />

    <script>
        let currentRoomCode = null;
        let currentUserName = null;
        let isHost = false;
        let currentVideoUrl = null;
        let supabaseClient = null;
        let channel = null;
        let player = null;
        let isSyncing = false;

        // --- Supabase Config ---
        const SUPABASE_URL = 'https://ejwqhywmmkhbvpuroowm.supabase.co'; // <-- Replace with your URL
        const SUPABASE_ANON_KEY = 'sb_publishable_vMG32X-EXlFoZBc98LFTog_Rtr1VgaX'; // <-- Replace with your Key

        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.warn('Supabase init failed, using demo mode:', e);
            supabaseClient = null;
        }

        // --- YouTube API Setup ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            // Player will be initialized when video is loaded
            console.log('YouTube API Ready');
        }

        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#06b6d4', '#8b5cf6', '#10b981', '#f59e0b', '#ec4899'];
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        function generateRoomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            return code;
        }

        function showScreen(screenId) {
            const currentScreen = document.querySelector('.screen.active');
            const nextScreen = document.getElementById(screenId);
            if (currentScreen) {
                currentScreen.style.animation = 'screenOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                setTimeout(() => {
                    currentScreen.classList.remove('active');
                    currentScreen.style.animation = '';
                    nextScreen.classList.add('active');
                }, 300);
            } else {
                nextScreen.classList.add('active');
            }
        }

        function shakeInput(input) {
            input.style.animation = 'shake 0.5s ease';
            setTimeout(() => input.style.animation = '', 500);
        }

        function createRoom() {
            const nameInput = document.getElementById('create-name');
            const name = nameInput.value.trim();
            if (!name) { shakeInput(nameInput); return; }

            currentUserName = name;
            currentRoomCode = generateRoomCode();
            isHost = true;

            document.getElementById('generated-code').textContent = currentRoomCode;
            showScreen('room-created-screen');
        }

        function joinRoom() {
            const nameInput = document.getElementById('join-name');
            const codeInput = document.getElementById('room-code-input');

            const name = nameInput.value.trim();
            const code = codeInput.value.trim().toUpperCase();

            if (!name) { shakeInput(nameInput); return; }
            if (!code || code.length !== 6) { shakeInput(codeInput); return; }

            currentUserName = name;
            currentRoomCode = code;
            isHost = false;

            enterRoom();
        }

        let syncInterval = null;

        function startHeartbeat() {
            if (syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(() => {
                if (player && player.getPlayerState() === YT.PlayerState.PLAYING) {
                    broadcastEvent('HEARTBEAT', { time: player.getCurrentTime() });
                }
            }, 5000);
        }

        function enterRoom() {
            document.getElementById('room-code-display').textContent = currentRoomCode;
            document.getElementById('user-name-display').textContent = currentUserName;

            const userBadge = document.getElementById('user-badge');
            if (isHost) {
                userBadge.classList.add('host');
                userBadge.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>${currentUserName}</span>`;
                document.getElementById('host-controls').style.display = 'block';
                document.getElementById('viewer-notice').style.display = 'none';
                startHeartbeat();
            } else {
                userBadge.classList.remove('host');
                userBadge.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>${currentUserName}</span>`;
                document.getElementById('host-controls').style.display = 'none';
                document.getElementById('viewer-notice').style.display = 'block';
            }

            if (supabaseClient) {
                setupRealtime();
            } else {
                // Demo fallback
                updateParticipants([
                    { name: currentUserName, is_host: isHost },
                    { name: 'Alex', is_host: false },
                    { name: 'Sam', is_host: false }
                ]);
            }

            showScreen('room-screen');
        }

        function setupRealtime() {
            try {
                channel = supabaseClient.channel(`room_${currentRoomCode}`, {
                    config: {
                        presence: { key: currentUserName }
                    }
                });

                channel
                    .on('broadcast', { event: 'sync' }, ({ payload }) => {
                        handleRemoteEvent(payload);
                    })
                    .on('presence', { event: 'sync' }, () => {
                        const state = channel.presenceState();
                        const participants = [];
                        for (const key in state) {
                            state[key].forEach(p => participants.push({ name: key, is_host: p.is_host }));
                        }
                        updateParticipants(participants);
                    })
                    .subscribe(async (status) => {
                        if (status === 'SUBSCRIBED') {
                            await channel.track({ is_host: isHost, joined_at: new Date().toISOString() });
                            if (!isHost) {
                                broadcastEvent('REQUEST_SYNC', {});
                            }
                        }
                    });
            } catch (e) {
                console.warn('Realtime setup failed:', e);
                supabaseClient = null;
            }
        }

        function updateParticipants(participants) {
            const list = document.getElementById('participants-list');
            const count = document.getElementById('participant-count');
            count.textContent = participants.length;

            const colors = ['#06b6d4', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444', '#ec4899'];

            list.innerHTML = participants.map((p, i) => {
                const initial = p.name.charAt(0).toUpperCase();
                const color = colors[i % colors.length];
                const roleClass = p.is_host ? 'host' : 'viewer';
                const roleText = p.is_host ? 'Host' : 'Viewer';

                return `
                    <div class="participant-card">
                        <div class="participant-avatar" style="background: ${color}15; border: 1px solid ${color}30; color: ${color}">${initial}</div>
                        <span class="participant-name">${p.name}</span>
                        <span class="participant-role ${roleClass}">${roleText}</span>
                    </div>
                `;
            }).join('');
        }

        function extractVideoId(url) {
            // YouTube patterns
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
                /youtube\.com\/v\/([a-zA-Z0-9_-]{11})/,
                /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function onPlayerReady(event) {
            console.log('Player ready');
        }

        function onPlayerStateChange(event) {
            if (!isHost || isSyncing) return;

            const state = event.data;
            const time = player.getCurrentTime();

            if (state === YT.PlayerState.PLAYING) {
                broadcastEvent('PLAY', { time });
            } else if (state === YT.PlayerState.PAUSED) {
                broadcastEvent('PAUSE', { time });
            }
        }

        function broadcastEvent(type, data) {
            if (!channel) return;
            channel.send({
                type: 'broadcast',
                event: 'sync',
                payload: { type, ...data, sender: currentUserName }
            });
        }

        function handleRemoteEvent(payload) {
            if (payload.sender === currentUserName) return;

            if (isHost && payload.type === 'REQUEST_SYNC') {
                if (player) {
                    const videoUrl = player.getVideoUrl();
                    const videoId = videoUrl ? extractVideoId(videoUrl) : null;
                    if (videoId) {
                        broadcastEvent('LOAD', { videoId });
                        setTimeout(() => {
                            broadcastEvent('PLAY', { time: player.getCurrentTime() });
                        }, 1000);
                    }
                }
                return;
            }

            if (isHost || !player) return;

            isSyncing = true;
            if (payload.type === 'PLAY') {
                player.seekTo(payload.time, true);
                player.playVideo();
            } else if (payload.type === 'PAUSE') {
                player.pauseVideo();
                player.seekTo(payload.time, true);
            } else if (payload.type === 'LOAD') {
                loadVideoInternal(payload.videoId);
            } else if (payload.type === 'SEEK' || payload.type === 'HEARTBEAT' || payload.type === 'REQUEST_SYNC_REPLY') {
                const currentTime = player.getCurrentTime();
                if (Math.abs(currentTime - payload.time) > 1.5 || payload.force) {
                    player.seekTo(payload.time, true);
                }
            }
            setTimeout(() => { isSyncing = false; }, 500);
        }

        function loadVideo() {
            const input = document.getElementById('video-link-input');
            const url = input.value.trim();
            if (!url) { shakeInput(input); return; }

            const videoId = extractVideoId(url);
            if (!videoId) { alert('Please enter a valid YouTube URL'); return; }

            loadVideoInternal(videoId);
            if (isHost) {
                broadcastEvent('LOAD', { videoId });
            }
        }

        function loadVideoInternal(videoId) {
            const container = document.getElementById('video-container');
            container.innerHTML = '<div id="player-element"></div>';

            player = new YT.Player('player-element', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'controls': isHost ? 1 : 0, // Viewers can't control
                    'disablekb': isHost ? 0 : 1,
                    'modestbranding': 1,
                    'rel': 0,
                    'origin': window.location.origin === "null" || window.location.origin === "file://" ? "http://localhost" : window.location.origin
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });

            document.getElementById('video-placeholder-text').textContent = 'Video loaded!';
        }

        async function copyRoomCode() {
            try {
                await navigator.clipboard.writeText(currentRoomCode);
                const btn = document.getElementById('copy-room-code-btn');
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
                setTimeout(() => {
                    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Room Code';
                }, 2000);
            } catch (err) { console.error('Failed to copy'); }
        }

        function leaveRoom() {
            if (channel) {
                channel.unsubscribe();
                channel = null;
            }
            if (syncInterval) {
                clearInterval(syncInterval);
                syncInterval = null;
            }
            currentRoomCode = null;
            currentUserName = null;
            isHost = false;
            currentVideoUrl = null;

            document.getElementById('create-name').value = '';
            document.getElementById('join-name').value = '';
            document.getElementById('room-code-input').value = '';
            document.getElementById('video-link-input').value = '';

            // Reset video container
            document.getElementById('video-container').innerHTML = `
                <div class="video-placeholder" id="video-placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                    <p id="video-placeholder-text">Waiting for host to load a video...</p>
                </div>
            `;

            showScreen('welcome-screen');
        }

        // Event Listeners
        document.getElementById('create-room-btn').addEventListener('click', () => {
            showScreen('create-room-screen');
            setTimeout(() => document.getElementById('create-name').focus(), 400);
        });

        document.getElementById('join-room-btn').addEventListener('click', () => {
            showScreen('join-room-screen');
            setTimeout(() => document.getElementById('join-name').focus(), 400);
        });

        document.getElementById('back-from-create').addEventListener('click', () => showScreen('welcome-screen'));
        document.getElementById('back-from-join').addEventListener('click', () => showScreen('welcome-screen'));

        document.getElementById('generate-room-btn').addEventListener('click', createRoom);
        document.getElementById('join-btn').addEventListener('click', joinRoom);

        document.getElementById('copy-code-btn').addEventListener('click', async () => {
            const code = document.getElementById('generated-code').textContent;
            await navigator.clipboard.writeText(code);
            const btn = document.getElementById('copy-code-btn');
            btn.classList.add('copied');
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Copied!</span>';
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>Copy Code</span>';
            }, 2000);
        });

        document.getElementById('enter-room-btn').addEventListener('click', enterRoom);
        document.getElementById('leave-room-btn').addEventListener('click', leaveRoom);
        document.getElementById('load-video-btn').addEventListener('click', loadVideo);
        document.getElementById('copy-room-code-btn').addEventListener('click', copyRoomCode);
        document.getElementById('sync-with-host-btn').addEventListener('click', () => {
            if (channel) broadcastEvent('REQUEST_SYNC', {});
        });

        document.getElementById('create-name').addEventListener('keypress', (e) => { if (e.key === 'Enter') createRoom(); });
        document.getElementById('join-name').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('room-code-input').focus(); });
        document.getElementById('room-code-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') joinRoom(); });
        document.getElementById('video-link-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') loadVideo(); });

        document.getElementById('room-code-input').addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        });

        createParticles();
        showScreen('welcome-screen');
    </script>
</body>

</html>
