<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaleedFlixer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --dark: #080a0e;
      --surface: #0f1218;
      --surface2: #161b24;
      --border: rgba(201, 168, 76, 0.15);
      --text: #e8e6e0;
      --muted: #6b7280;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow-x: hidden;
    }

    h1,
    h2,
    h3,
    .brand {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.04em;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--dark);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--gold);
      border-radius: 2px;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 50;
      background: linear-gradient(to bottom, rgba(8, 10, 14, 0.98) 0%, transparent 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }

    .brand-logo {
      font-size: 1.8rem;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    .brand-logo span {
      color: var(--text);
    }

    /* Search bar */
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 420px;
    }

    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 1rem 0.5rem 2.6rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .search-input:focus {
      border-color: var(--gold);
      background: rgba(201, 168, 76, 0.05);
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    /* Toggle tabs */
    .tab-group {
      display: flex;
      gap: 0.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      flex-shrink: 0;
    }

    .tab-btn {
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab-btn.active {
      background: var(--gold);
      color: var(--dark);
      font-weight: 600;
    }

    /* Hero */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
      transition: background-image 0.5s;
    }

    .hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right,
          rgba(8, 10, 14, 0.95) 0%,
          rgba(8, 10, 14, 0.6) 50%,
          rgba(8, 10, 14, 0.1) 100%),
        linear-gradient(to top,
          rgba(8, 10, 14, 1) 0%,
          transparent 40%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 3rem 2rem 4rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(201, 168, 76, 0.15);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 1rem;
    }

    .hero-title {
      font-size: clamp(2.5rem, 6vw, 5.5rem);
      line-height: 0.95;
      color: var(--text);
      max-width: 600px;
      margin-bottom: 1rem;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
    }

    .hero-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .hero-rating {
      color: var(--gold);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .hero-overview {
      max-width: 480px;
      font-size: 0.9rem;
      line-height: 1.65;
      color: rgba(232, 230, 224, 0.75);
      margin-bottom: 2rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hero-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold);
      color: var(--dark);
      font-weight: 700;
      font-size: 0.875rem;
      padding: 0.7rem 1.8rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .btn-primary:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.35);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-weight: 500;
      font-size: 0.875rem;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.25);
    }

    /* Hero indicators */
    .hero-dots {
      display: flex;
      gap: 6px;
      margin-top: 2rem;
    }

    .hero-dot {
      width: 24px;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }

    .hero-dot.active {
      background: var(--gold);
      width: 40px;
    }

    /* Main content */
    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    /* Genre filters */
    .genre-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .genre-scroll::-webkit-scrollbar {
      display: none;
    }

    .genre-chip {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .genre-chip:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .genre-chip.active {
      background: rgba(201, 168, 76, 0.12);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* Section headings */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .section-title {
      font-size: 1.5rem;
      color: var(--text);
    }

    .section-title span {
      color: var(--gold);
    }

    .see-all {
      font-size: 0.78rem;
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.8;
      transition: opacity 0.2s;
      background: none;
      border: none;
      cursor: pointer;
    }

    .see-all:hover {
      opacity: 1;
    }

    /* Cards grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.25rem;
    }

    @media (min-width: 640px) {
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }
    }

    @media (min-width: 1024px) {
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
    }

    /* Card */
    .card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      group: true;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--gold);
      border-color: var(--gold);
    }

    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(8, 10, 14, 0.95) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .card-play-btn {
      width: 50px;
      height: 50px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: scale(0.8);
      transition: transform 0.2s;
      color: var(--dark);
    }

    .card:hover .card-play-btn {
      transform: scale(1);
    }

    .card-info {
      padding: 0.75rem;
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .card-rating {
      display: flex;
      align-items: center;
      gap: 3px;
      color: var(--gold);
      font-weight: 600;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    .skeleton-card {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .skeleton-poster {
      width: 100%;
      aspect-ratio: 2/3;
    }

    .skeleton-line {
      height: 12px;
      margin: 0.75rem 0.75rem 4px;
    }

    .skeleton-line-sm {
      height: 10px;
      width: 60%;
      margin: 0 0.75rem 0.75rem;
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 1100px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 95vh;
      animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(100% - 80px);
    }

    .modal-close {
      width: 34px;
      height: 34px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Player container */
    .player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      flex-shrink: 0;
    }

    .player-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* TV episode selector */
    .episode-bar {
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-top: 1px solid var(--border);
      background: var(--surface2);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .ep-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
    }

    .ep-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
    }

    .ep-select:focus {
      border-color: var(--gold);
    }

    .ep-select option {
      background: var(--surface);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--muted);
    }

    .empty-state h3 {
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 0.5rem;
      font-family: 'DM Sans', sans-serif;
    }

    /* Divider */
    .section-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 3rem 0;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 200;
      background: var(--surface2);
      border: 1px solid var(--gold);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* Responsive nav */
    @media (max-width: 600px) {
      .nav-inner {
        gap: 0.75rem;
      }

      .brand-logo {
        font-size: 1.4rem;
      }

      .tab-btn span {
        display: none;
      }
    }

    /* Scrollable modal on small screens */
    @media (max-width: 768px) {
      .modal {
        max-height: 98vh;
      }

      .episode-bar {
        gap: 0.5rem;
      }
    }

    /* ── Nav auth controls ── */
    .nav-auth {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .btn-auth {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-auth-outline {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
    }

    .btn-auth-outline:hover {
      background: rgba(201, 168, 76, 0.1);
    }

    .btn-auth-fill {
      background: var(--gold);
      color: var(--dark);
    }

    .btn-auth-fill:hover {
      background: var(--gold-light);
    }

    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--dark);
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .user-avatar:hover {
      border-color: var(--gold-light);
    }

    .user-menu {
      position: relative;
    }

    .user-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      min-width: 180px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 60;
    }

    .user-dropdown.open {
      display: flex;
    }

    .user-dropdown-email {
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.65rem 1rem;
      font-size: 0.82rem;
      color: var(--text);
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: background 0.15s;
    }

    .user-dropdown-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .user-dropdown-item.danger {
      color: #f87171;
    }

    /* ── Auth Modal ── */
    .auth-backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .auth-backdrop.open {
      display: flex;
    }

    .auth-box {
      width: 100%;
      max-width: 420px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .auth-header {
      padding: 1.5rem 1.5rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .auth-brand {
      font-size: 1.6rem;
      color: var(--gold);
      margin-bottom: 0.25rem;
    }

    .auth-sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 1.5rem;
    }

    .auth-tab {
      flex: 1;
      padding: 0.45rem;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: var(--gold);
      color: var(--dark);
    }

    .auth-body {
      padding: 0 1.5rem 1.5rem;
    }

    .auth-field {
      margin-bottom: 1rem;
    }

    .auth-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .auth-input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .auth-input:focus {
      border-color: var(--gold);
    }

    .auth-input::placeholder {
      color: var(--muted);
    }

    .auth-submit {
      width: 100%;
      padding: 0.75rem;
      background: var(--gold);
      color: var(--dark);
      font-weight: 700;
      font-size: 0.9rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .auth-submit:hover {
      background: var(--gold-light);
    }

    .auth-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .auth-error {
      color: #f87171;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      text-align: center;
      min-height: 1.2em;
    }

    .auth-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text);
    }

    .auth-close:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* ── History Panel ── */
    .history-backdrop {
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(6px);
      display: none;
    }

    .history-backdrop.open {
      display: block;
    }

    .history-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 360px;
      max-width: 95vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 151;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .history-panel.open {
      transform: translateX(0);
    }

    .history-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .history-panel-title {
      font-size: 1.2rem;
      color: var(--text);
    }

    .history-panel-title span {
      color: var(--gold);
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .history-item {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      padding: 0.65rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .history-item:hover {
      border-color: var(--gold);
    }

    .history-poster {
      width: 46px;
      height: 69px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .history-info {
      flex: 1;
      min-width: 0;
    }

    .history-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .history-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .history-delete:hover {
      color: #f87171;
    }

    .history-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.875rem;
    }

    .history-clear-btn {
      margin: 0 1rem 1rem;
      padding: 0.6rem;
      width: calc(100% - 2rem);
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: #f87171;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .history-clear-btn:hover {
      background: rgba(248, 113, 113, 0.2);
    }
  </style>
</head>

  <!-- ═══════════════════════════════════ SCRIPT ═══════════════════════════════════ -->
  <script>
    // ─── CONFIG (Loaded from config.js) ──────────────────────────────────────────
    const { 
      TMDB_API_KEY, 
      TMDB_BASE, 
      IMG_BASE, 
      VIDKING_BASE, 
      SUPABASE_URL, 
      SUPABASE_ANON_KEY 
    } = window.APP_CONFIG || {
      TMDB_API_KEY: '',
      TMDB_BASE: '',
      IMG_BASE: '',
      VIDKING_BASE: '',
      SUPABASE_URL: '',
      SUPABASE_ANON_KEY: ''
    };

    let sbClient = null;
    let currentUser = null;

    function initSupabase() {
      try {
        const sb = window.supabase || window.Supabase;
        if (!sb || !sb.createClient) { console.warn('Supabase CDN not loaded'); return; }
        sbClient = sb.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        sbClient.auth.onAuthStateChange((_event, session) => {
          currentUser = session?.user ?? null;
          updateNavAuth();
        });
        sbClient.auth.getSession().then(({ data: { session } }) => {
          currentUser = session?.user ?? null;
          updateNavAuth();
        });
        console.log('Supabase initialized ✓');
      } catch (e) { console.warn('Supabase init failed:', e); }
    }

    // ─── AUTH UI ─────────────────────────────────────────────────────────────────
    function updateNavAuth() {
      const guest = document.getElementById('navGuest');
      const user = document.getElementById('navUser');
      if (currentUser) {
        guest.style.display = 'none';
        user.style.display = 'block';
        const email = currentUser.email || '';
        const username = email.split('@')[0]; // Show only username part
        document.getElementById('userEmail').textContent = username;
        document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();
      } else {
        guest.style.display = 'flex';
        user.style.display = 'none';
      }
      lucide.createIcons();
    }

    function openAuth(tab = 'login') {
      document.getElementById('authBackdrop').classList.add('open');
      switchAuthTab(tab);
      document.getElementById('loginError').textContent = '';
      document.getElementById('signupError').textContent = '';
      lucide.createIcons();
    }

    function closeAuth() {
      document.getElementById('authBackdrop').classList.remove('open');
    }

    function switchAuthTab(tab) {
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('authTabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('authTabSignup').classList.toggle('active', tab === 'signup');
    }

    async function doLogin() {
      if (!sbClient) return showToast('⚠ Supabase not configured.');
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!username) return;
      const email = `${username}@stream.vault`; // Dummy email domain
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      btn.disabled = true; btn.textContent = 'Logging in…';
      const { error } = await sbClient.auth.signInWithPassword({ email, password });
      btn.disabled = false; btn.textContent = 'Log In';
      if (error) { errEl.textContent = error.message; return; }
      closeAuth();
      showToast('✓ Welcome back!');
    }

    async function doSignup() {
      if (!sbClient) return showToast('⚠ Supabase not configured.');
      const username = document.getElementById('signupUsername').value.trim();
      const password = document.getElementById('signupPassword').value;
      if (!username) return;
      const email = `${username}@stream.vault`; // Dummy email domain
      const btn = document.getElementById('signupBtn');
      const errEl = document.getElementById('signupError');
      errEl.textContent = '';
      btn.disabled = true; btn.textContent = 'Creating account…';
      
      const { data, error } = await sbClient.auth.signUp({ email, password });
      
      if (error) {
        btn.disabled = false; 
        btn.textContent = 'Create Account';
        errEl.textContent = error.message; 
        return; 
      }

      if (data?.session) {
        btn.disabled = false;
        btn.textContent = 'Create Account';
        closeAuth();
        showToast('✓ Account created and logged in!');
      } else {
        // Try logging in immediately
        const { error: loginError } = await sbClient.auth.signInWithPassword({ email, password });
        btn.disabled = false; 
        btn.textContent = 'Create Account';
        
        if (loginError) {
          errEl.textContent = 'Account created! Please log in.';
        } else {
          closeAuth();
          showToast('✓ Account created successfully!');
        }
      }
    }

    async function signOut() {
      toggleUserDropdown();
      if (!sbClient) return;
      await sbClient.auth.signOut();
      showToast('Signed out successfully.');
    }

    function toggleUserDropdown() {
      document.getElementById('userDropdown').classList.toggle('open');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('navUser');
      const dd = document.getElementById('userDropdown');
      if (dd && !menu?.contains(e.target)) dd.classList.remove('open');
    });

    // ─── WATCH HISTORY ────────────────────────────────────────────────────────────
    async function saveToHistory(item) {
      if (!sbClient || !currentUser) return;
      const isTV = !!(item.first_air_date || (item.name && !item.title));
      await sbClient.from('watch_history').upsert({
        user_id: currentUser.id,
        tmdb_id: item.id,
        media_type: isTV ? 'tv' : 'movie',
        title: item.title || item.name || 'Unknown',
        poster_path: item.poster_path || null,
        watched_at: new Date().toISOString(),
      }, { onConflict: 'user_id,tmdb_id,media_type' });
    }

    async function loadHistory() {
      if (!sbClient || !currentUser) return [];
      const { data, error } = await sbClient
        .from('watch_history')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('watched_at', { ascending: false })
        .limit(50);
      if (error) { console.error(error); return []; }
      return data || [];
    }

    async function deleteHistoryItem(id) {
      if (!sbClient || !currentUser) return;
      await sbClient.from('watch_history').delete().eq('id', id).eq('user_id', currentUser.id);
      openHistory(); // refresh
    }

    async function clearHistory() {
      if (!sbClient || !currentUser) return;
      if (!confirm('Clear your entire watch history?')) return;
      await sbClient.from('watch_history').delete().eq('user_id', currentUser.id);
      openHistory(); // refresh
    }

    async function openHistory() {
      if (!currentUser) { openAuth('login'); return; }
      document.getElementById('historyBackdrop').classList.add('open');
      document.getElementById('historyPanel').classList.add('open');
      document.getElementById('historyList').innerHTML = '<div class="history-empty">Loading…</div>';
      document.getElementById('historyClearBtn').style.display = 'none';
      lucide.createIcons();

      const items = await loadHistory();
      const list = document.getElementById('historyList');
      if (!items.length) {
        list.innerHTML = '<div class="history-empty"><i data-lucide="clock" style="width:36px;height:36px;margin:0 auto 0.75rem;display:block;opacity:0.3;"></i>No watch history yet.</div>';
        lucide.createIcons();
        return;
      }
      document.getElementById('historyClearBtn').style.display = 'block';
      list.innerHTML = items.map(it => {
        const poster = it.poster_path
          ? `${IMG_BASE}/w92${it.poster_path}`
          : 'https://via.placeholder.com/46x69/0f1218/c9a84c?text=?';
        const date = new Date(it.watched_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
        const badge = it.media_type === 'tv' ? 'TV' : 'Movie';
        return `
    <div class="history-item" onclick="playFromHistory(${JSON.stringify(it).replace(/"/g, '&quot;')})">
      <img class="history-poster" src="${poster}" alt="${escHtml(it.title)}" loading="lazy" />
      <div class="history-info">
        <div class="history-title">${escHtml(it.title)}</div>
        <div class="history-meta">${badge} · Watched ${date}</div>
      </div>
      <button class="history-delete" onclick="event.stopPropagation(); deleteHistoryItem('${it.id}')" title="Remove">
        <i data-lucide="x" style="width:14px;height:14px;"></i>
      </button>
    </div>`;
      }).join('');
      lucide.createIcons();
    }

    function closeHistory() {
      document.getElementById('historyBackdrop').classList.remove('open');
      document.getElementById('historyPanel').classList.remove('open');
    }

    function playFromHistory(it) {
      closeHistory();
      // Reconstruct a minimal item object to pass to openPlayer
      const fakeItem = {
        id: it.tmdb_id,
        title: it.media_type === 'movie' ? it.title : undefined,
        name: it.media_type === 'tv' ? it.title : undefined,
        poster_path: it.poster_path,
      };
      openPlayer(fakeItem);
    }

    // ─── TMDB FETCH HELPER ────────────────────────────────────────────────────────
    async function tmdbFetch(endpoint, params = {}) {
      const key = TMDB_API_KEY.trim();
      const isToken = key.length > 60;
      let url = `${TMDB_BASE}/${endpoint}`;

      const options = {
        method: 'GET',
        headers: { 'Accept': 'application/json' }
      };

      if (isToken) {
        options.headers['Authorization'] = `Bearer ${key}`;
      } else {
        params['api_key'] = key;
      }

      const sParams = new URLSearchParams(params);
      if (!params.language) sParams.set('language', 'en-US');

      const query = sParams.toString();
      if (query) url += (url.includes('?') ? '&' : '?') + query;

      const res = await fetch(url, options);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.status_message || `HTTP ${res.status}`);
      }
      return await res.json();
    }


    // ─── STATE ────────────────────────────────────────────────────────────────────
    let currentTab = 'movie';
    let currentGenre = null;
    let heroItems = [];
    let heroIndex = 0;
    let heroTimer = null;
    let currentItem = null;
    let tvSeasons = [];
    let searchTimeout = null;

    // ─── GENRES ──────────────────────────────────────────────────────────────────
    const MOVIE_GENRES = [
      { id: 28, name: 'Action' }, { id: 12, name: 'Adventure' }, { id: 16, name: 'Animation' },
      { id: 35, name: 'Comedy' }, { id: 80, name: 'Crime' }, { id: 99, name: 'Documentary' },
      { id: 18, name: 'Drama' }, { id: 14, name: 'Fantasy' }, { id: 27, name: 'Horror' },
      { id: 9648, name: 'Mystery' }, { id: 10749, name: 'Romance' }, { id: 878, name: 'Sci-Fi' },
      { id: 53, name: 'Thriller' }, { id: 37, name: 'Western' },
    ];

    const TV_GENRES = [
      { id: 10759, name: 'Action & Adventure' }, { id: 16, name: 'Animation' }, { id: 35, name: 'Comedy' },
      { id: 80, name: 'Crime' }, { id: 99, name: 'Documentary' }, { id: 18, name: 'Drama' },
      { id: 10751, name: 'Family' }, { id: 10762, name: 'Kids' }, { id: 9648, name: 'Mystery' },
      { id: 10763, name: 'News' }, { id: 10764, name: 'Reality' }, { id: 10765, name: 'Sci-Fi & Fantasy' },
      { id: 10766, name: 'Soap' }, { id: 10767, name: 'Talk' }, { id: 10768, name: 'War & Politics' }, { id: 37, name: 'Western' },
    ];

    // ─── INIT ────────────────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      buildGenreBar();
      fetchAll();
      setupSearch();
      initSupabase();
    });

    // ─── SEARCH ──────────────────────────────────────────────────────────────────
    function setupSearch() {
      const inp = document.getElementById('searchInput');
      inp.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        const q = inp.value.trim();
        if (!q) { fetchAll(); return; }

        // Immediate feedback: hide sections and show searching state
        document.getElementById('heroSection').style.display = 'none';
        document.getElementById('topRatedSection').style.display = 'none';
        document.querySelector('#trendingSection .see-all').style.display = 'none';
        document.querySelector('#trendingSection .section-title').innerHTML = `Searching for "<span>${escHtml(q)}</span>"…`;
        showSkeletons('trendingGrid', 12);

        searchTimeout = setTimeout(() => searchContent(q), 400);
      });
    }

    function goHome(e) {
      if (e) e.preventDefault();
      document.getElementById('searchInput').value = '';
      currentGenre = null;
      // Reset genre pills UI
      document.querySelectorAll('.genre-chip').forEach((c, i) => {
        c.classList.toggle('active', i === 0);
      });
      fetchAll();
    }

    async function searchContent(query) {
      const type = currentTab === 'movie' ? 'movie' : 'tv';

      try {
        const data = await tmdbFetch(`search/${type}`, { query, page: 1 });
        document.querySelector('#trendingSection .section-title').innerHTML = `Search results for "<span>${escHtml(query)}</span>"`;
        renderGrid('trendingGrid', data.results || []);
      } catch (e) { showApiError(e); }
    }

    // ─── TAB SWITCH ──────────────────────────────────────────────────────────────
    function switchTab(tab) {
      currentTab = tab;
      currentGenre = null;
      document.getElementById('searchInput').value = '';
      document.getElementById('tabMovies').classList.toggle('active', tab === 'movie');
      document.getElementById('tabTV').classList.toggle('active', tab === 'tv');
      document.getElementById('sectionLabel').textContent = tab === 'movie' ? 'Movies' : 'TV Shows';
      buildGenreBar();
      fetchAll();
      lucide.createIcons();
    }

    // ─── GENRE BAR ───────────────────────────────────────────────────────────────
    function buildGenreBar() {
      const genres = currentTab === 'movie' ? MOVIE_GENRES : TV_GENRES;
      const bar = document.getElementById('genreBar');
      bar.innerHTML = `<button class="genre-chip active" onclick="filterGenre(null, this)">All</button>` +
        genres.map(g => `<button class="genre-chip" onclick="filterGenre(${g.id}, this)">${g.name}</button>`).join('');
    }

    function filterGenre(id, el) {
      currentGenre = id;
      document.querySelectorAll('.genre-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      fetchAll();
    }

    // ─── FETCH ALL ───────────────────────────────────────────────────────────────
    async function fetchAll() {
      // Show hero and other sections
      document.getElementById('heroSection').style.display = 'flex';
      document.getElementById('topRatedSection').style.display = 'block';
      document.querySelector('#trendingSection .see-all').style.display = 'flex';
      const label = currentTab === 'movie' ? 'Movies' : 'TV Shows';
      document.querySelector('#trendingSection .section-title').innerHTML = `Trending <span id="sectionLabel">${label}</span>`;

      showSkeletons('trendingGrid', 12);
      showSkeletons('topRatedGrid', 12);
      const type = currentTab;

      try {
        const [trending, topRated] = await Promise.all([
          fetchItems(`trending/${type}/week`),
          fetchItems(`${type}/top_rated`),
        ]);

        heroItems = trending.slice(0, 5);
        setupHero();

        const filtered = currentGenre
          ? items => items.filter(m => m.genre_ids?.includes(currentGenre))
          : items => items;

        renderGrid('trendingGrid', filtered(trending));
        renderGrid('topRatedGrid', filtered(topRated));
      } catch (e) { showApiError(e); }
    }

    async function fetchItems(endpoint) {
      try {
        const data = await tmdbFetch(endpoint, { page: 1 });
        return data.results || [];
      } catch (e) { return []; }
    }

    // ─── HERO ─────────────────────────────────────────────────────────────────────
    function setupHero() {
      if (!heroItems.length) return;
      buildHeroDots();
      showHeroItem(0);
      clearInterval(heroTimer);
      heroTimer = setInterval(() => {
        heroIndex = (heroIndex + 1) % heroItems.length;
        showHeroItem(heroIndex);
      }, 7000);
    }

    function buildHeroDots() {
      const dots = document.getElementById('heroDots');
      dots.innerHTML = heroItems.map((_, i) =>
        `<button class="hero-dot ${i === 0 ? 'active' : ''}" onclick="goHero(${i})"></button>`
      ).join('');
    }

    function goHero(i) {
      heroIndex = i;
      showHeroItem(i);
      clearInterval(heroTimer);
      heroTimer = setInterval(() => {
        heroIndex = (heroIndex + 1) % heroItems.length;
        showHeroItem(heroIndex);
      }, 7000);
    }

    function showHeroItem(i) {
      const item = heroItems[i];
      const bg = document.getElementById('heroBg');
      const title = item.title || item.name || 'Unknown';

      bg.style.backgroundImage = item.backdrop_path
        ? `url(${IMG_BASE}/original${item.backdrop_path})`
        : 'linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%)';

      document.getElementById('heroTitle').textContent = title;
      document.getElementById('heroOverview').textContent = item.overview || 'No description available.';
      document.getElementById('heroRating').innerHTML =
        `<i data-lucide="star" style="width:13px;height:13px;fill:currentColor;"></i> ${item.vote_average?.toFixed(1) || '—'}`;
      document.getElementById('heroYear').textContent =
        (item.release_date || item.first_air_date || '').slice(0, 4) || '—';
      document.getElementById('heroGenre').textContent =
        currentTab === 'movie' ? 'Movie' : 'TV Show';

      document.querySelectorAll('.hero-dot').forEach((d, idx) => {
        d.classList.toggle('active', idx === i);
      });

      currentItem = item;
      lucide.createIcons();
    }

    function heroPlay() {
      if (!currentItem) return;
      openPlayer(currentItem);
    }

    function heroInfo() {
      if (!currentItem) return;
      const title = currentItem.title || currentItem.name;
      showToast(`"${title}" — ${currentItem.overview?.slice(0, 80)}…`);
    }

    // ─── GRID RENDERING ──────────────────────────────────────────────────────────
    function renderGrid(gridId, items) {
      const grid = document.getElementById(gridId);
      if (!items.length) {
        grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i data-lucide="search-x" style="width:40px;height:40px;color:var(--gold);margin:0 auto 1rem;display:block;"></i>
        <h3>Nothing found</h3>
        <p style="font-size:0.85rem;">Try a different search or genre filter.</p>
      </div>`;
        lucide.createIcons();
        return;
      }
      grid.innerHTML = items.map(item => cardHTML(item)).join('');
      lucide.createIcons();
    }

    function cardHTML(item) {
      const title = escHtml(item.title || item.name || 'Unknown');
      const year = (item.release_date || item.first_air_date || '').slice(0, 4);
      const rating = item.vote_average?.toFixed(1) || '—';
      const poster = item.poster_path
        ? `${IMG_BASE}/w342${item.poster_path}`
        : 'https://via.placeholder.com/342x513/0f1218/c9a84c?text=No+Image';
      const id = item.id;

      return `
  <div class="card" onclick="openPlayer(${JSON.stringify(item).replace(/"/g, '&quot;')})">
    <img class="card-poster" src="${poster}" alt="${title}" loading="lazy" />
    <div class="card-overlay">
      <div class="card-play-btn">
        <i data-lucide="play" style="width:20px;height:20px;fill:currentColor;"></i>
      </div>
    </div>
    <div class="card-info">
      <div class="card-title">${title}</div>
      <div class="card-meta">
        <span>${year || '—'}</span>
        <span class="card-rating">
          <i data-lucide="star" style="width:11px;height:11px;fill:currentColor;"></i>
          ${rating}
        </span>
      </div>
    </div>
  </div>`;
    }

    // ─── SKELETONS ────────────────────────────────────────────────────────────────
    function showSkeletons(gridId, count) {
      const grid = document.getElementById(gridId);
      grid.innerHTML = Array.from({ length: count }, () => `
    <div class="skeleton-card">
      <div class="skeleton skeleton-poster"></div>
      <div class="skeleton skeleton-line"></div>
      <div class="skeleton skeleton-line-sm"></div>
    </div>`).join('');
    }

    // ─── PLAYER / MODAL ──────────────────────────────────────────────────────────
    async function openPlayer(item) {
      if (typeof item === 'string') { try { item = JSON.parse(item); } catch (e) { return; } }
      currentItem = item;
      const isTV = !!(item.first_air_date || item.name && !item.title);
      const title = item.title || item.name;

      document.getElementById('modalTitle').textContent = title;
      document.getElementById('playerModal').classList.add('open');
      document.body.style.overflow = 'hidden';

      // Save to watch history (fire-and-forget)
      saveToHistory(item);

      if (isTV) {
        document.getElementById('episodeBar').style.display = 'flex';
        await buildSeasonSelector(item.id);
      } else {
        document.getElementById('episodeBar').style.display = 'none';
        loadPlayerSrc(`${VIDKING_BASE}/movie/${item.id}`);
      }

      lucide.createIcons();
    }

    function closeModal() {
      document.getElementById('playerModal').classList.remove('open');
      document.getElementById('playerFrame').src = '';
      document.body.style.overflow = '';
    }

    function loadPlayerSrc(src) {
      document.getElementById('playerFrame').src = src;
    }

    // ─── TV SEASONS / EPISODES ────────────────────────────────────────────────────
    async function buildSeasonSelector(tvId) {
      const seasonSel = document.getElementById('seasonSelect');
      const episodeSel = document.getElementById('episodeSelect');
      seasonSel.innerHTML = `<option>Loading…</option>`;
      episodeSel.innerHTML = `<option>—</option>`;

      try {
        const data = await tmdbFetch(`tv/${tvId}`);
        tvSeasons = (data.seasons || []).filter(s => s.season_number > 0);

        seasonSel.innerHTML = tvSeasons.map(s =>
          `<option value="${s.season_number}">${s.name || 'Season ' + s.season_number}</option>`
        ).join('');

        await buildEpisodeSelector(tvId, tvSeasons[0]?.season_number || 1);
      } catch (e) {
        seasonSel.innerHTML = `<option value="1">Season 1</option>`;
        buildEpisodeSelector(tvId, 1);
      }
    }

    async function buildEpisodeSelector(tvId, seasonNum) {
      const episodeSel = document.getElementById('episodeSelect');
      episodeSel.innerHTML = `<option>Loading…</option>`;

      try {
        const data = await tmdbFetch(`tv/${tvId}/season/${seasonNum}`);
        const eps = data.episodes || [];

        episodeSel.innerHTML = eps.map(e =>
          `<option value="${e.episode_number}">Ep ${e.episode_number}: ${e.name || ''}</option>`
        ).join('');

        const ep = eps[0]?.episode_number || 1;
        loadPlayerSrc(`${VIDKING_BASE}/tv/${tvId}/${seasonNum}/${ep}`);
      } catch (e) {
        episodeSel.innerHTML = `<option value="1">Episode 1</option>`;
        loadPlayerSrc(`${VIDKING_BASE}/tv/${tvId}/${seasonNum}/1`);
      }
    }

    async function onSeasonChange() {
      if (!currentItem) return;
      const s = document.getElementById('seasonSelect').value;
      await buildEpisodeSelector(currentItem.id, s);
    }

    function onEpisodeChange() {
      if (!currentItem) return;
      const s = document.getElementById('seasonSelect').value;
      const e = document.getElementById('episodeSelect').value;
      loadPlayerSrc(`${VIDKING_BASE}/tv/${currentItem.id}/${s}/${e}`);
    }

    // ─── LOAD MORE ────────────────────────────────────────────────────────────────
    async function loadMore() {
      showToast('Loading more content…');
      const type = currentTab;
      try {
        const data = await tmdbFetch(`trending/${type}/week`, { page: 2 });
        const grid = document.getElementById('trendingGrid');
        const html = (data.results || []).map(cardHTML).join('');
        grid.insertAdjacentHTML('beforeend', html);
        lucide.createIcons();
      } catch (e) { showApiError(e); }
    }

    // ─── TOAST ───────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
    }

    function showApiError(err) {
      console.error('TMDB Error:', err);
      const msg = err?.message || 'Check API key configuration.';
      showToast(`⚠ ${msg}`);
      renderGrid('trendingGrid', []);
      renderGrid('topRatedGrid', []);
    }

    // ─── UTILITIES ────────────────────────────────────────────────────────────────
    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Close modal on backdrop click
    document.getElementById('playerModal').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    // Keyboard close
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeModal();
        closeAuth();
        closeHistory();
      }
    });
  </script>
</body>

</html>
