<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaleedFlixer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --red: #ff1744;
      --red2: #ff4569;
      --red-glow: rgba(255,23,68,0.35);
      --dark: #080810;
      --dark2: #0d0d18;
      --surface: #111120;
      --surface2: #16162a;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --text: #eeeef5;
      --muted: #6b6b88;
      --muted2: #9999b8;
      --gold: #ffd60a;
      --green: #39d98a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      cursor: default;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* ── CUSTOM SCROLLBAR ── */
    ::-webkit-scrollbar { width: 3px; height: 0; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 99px; }

    /* ── FLOATING PARTICLES ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatParticle linear infinite;
      opacity: 0;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
    }

    /* ── BRAND HEADER ── */
    h1, h2, h3, .brand { font-family: 'Syne', sans-serif; }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 200;
      transition: all 0.5s ease;
      padding: 0;
    }

    nav::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(8,8,16,0.97) 0%, rgba(8,8,16,0.7) 70%, transparent 100%);
      transition: opacity 0.5s;
    }

    nav.scrolled::before {
      background: rgba(8,8,16,0.96);
      backdrop-filter: blur(20px) saturate(1.5);
      box-shadow: 0 1px 0 rgba(255,255,255,0.05), 0 8px 32px rgba(0,0,0,0.5);
    }

    .nav-inner {
      position: relative;
      max-width: 100%;
      margin: 0 auto;
      padding: 0 4%;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.02em;
      flex-shrink: 0;
      position: relative;
      transition: all 0.3s;
    }

    .brand-logo .w-accent {
      color: var(--red);
      text-shadow: 0 0 20px var(--red-glow), 0 0 40px var(--red-glow);
    }

    .brand-logo:hover {
      filter: brightness(1.15);
    }

    .nav-links {
      display: flex;
      gap: 0.25rem;
      align-items: center;
      flex-shrink: 0;
    }

    .nav-link {
      color: var(--muted2);
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s;
      background: none;
      border: none;
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      letter-spacing: 0.01em;
    }

    .nav-link:hover {
      color: #fff;
      background: rgba(255,255,255,0.05);
    }

    .nav-link.active {
      color: #fff;
      background: rgba(255,255,255,0.07);
    }

    /* ── SEARCH ── */
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 260px;
    }

    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 0.55rem 1rem 0.55rem 2.6rem;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.82rem;
      outline: none;
      transition: all 0.3s;
    }

    .search-input:focus {
      border-color: rgba(255,23,68,0.5);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px rgba(255,23,68,0.1);
    }

    .search-input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color 0.3s;
    }

    .search-input:focus ~ .search-icon,
    .search-wrap:focus-within .search-icon { color: var(--red); }

    /* ── TAB GROUP ── */
    .tab-group {
      display: flex;
      gap: 2px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 3px;
      flex-shrink: 0;
    }

    .tab-btn {
      padding: 0.4rem 1rem;
      border-radius: 9px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted2);
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 5px;
      letter-spacing: 0.01em;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      background: var(--red);
      color: #fff;
      box-shadow: 0 2px 12px rgba(255,23,68,0.4);
    }

    /* ── NAV AUTH ── */
    .nav-auth { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

    .btn-auth {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.4rem 1rem;
      border-radius: 10px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.25s;
      font-family: 'Outfit', sans-serif;
    }

    .btn-auth-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn-auth-outline:hover {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.05);
    }

    .btn-auth-fill {
      background: var(--red);
      color: #fff;
      box-shadow: 0 2px 12px rgba(255,23,68,0.35);
    }

    .btn-auth-fill:hover {
      background: var(--red2);
      box-shadow: 0 4px 20px rgba(255,23,68,0.5);
      transform: translateY(-1px);
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--red), #ff6b6b);
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.25s;
      box-shadow: 0 2px 10px rgba(255,23,68,0.3);
    }

    .user-avatar:hover {
      border-color: rgba(255,255,255,0.4);
      transform: scale(1.05);
    }

    .user-menu { position: relative; }

    .user-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      background: rgba(13,13,24,0.97);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      min-width: 190px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.03);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 300;
      animation: dropIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes dropIn {
      from { opacity: 0; transform: scale(0.95) translateY(-8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .user-dropdown.open { display: flex; }

    .user-dropdown-email {
      padding: 0.85rem 1rem;
      font-size: 0.72rem;
      color: var(--muted2);
      border-bottom: 1px solid var(--glass-border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .user-dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.7rem 1rem;
      font-size: 0.82rem;
      color: var(--text);
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: background 0.15s;
      font-family: 'Outfit', sans-serif;
    }

    .user-dropdown-item:hover { background: rgba(255,255,255,0.06); }
    .user-dropdown-item.danger { color: #ff6b6b; }

    /* ══════════════════════════════════ HERO ══════════════════════════════════ */
    .hero {
      position: relative;
      height: 90vh;
      min-height: 550px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: -5%;
      background-size: cover;
      background-position: center 20%;
      transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      transform: scale(1.05);
      filter: saturate(1.2);
    }

    .hero-bg.transitioning {
      opacity: 0;
      transform: scale(1.1);
    }

    .hero-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 40%, transparent 40%, rgba(8,8,16,0.7) 100%),
        linear-gradient(to right, rgba(8,8,16,0.95) 0%, rgba(8,8,16,0.5) 45%, rgba(8,8,16,0.1) 100%),
        linear-gradient(to top, rgba(8,8,16,1) 0%, rgba(8,8,16,0.4) 18%, transparent 50%);
    }

    /* Animated scanline effect */
    .hero-scan {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.015) 2px,
        rgba(0,0,0,0.015) 4px
      );
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 0 5% 13vh;
      width: 100%;
      max-width: 680px;
    }

    /* Animated badge */
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--red), var(--red2));
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 99px;
      margin-bottom: 1.2rem;
      box-shadow: 0 0 20px rgba(255,23,68,0.4);
      animation: pulseBadge 2.5s ease-in-out infinite;
    }

    @keyframes pulseBadge {
      0%, 100% { box-shadow: 0 0 20px rgba(255,23,68,0.4); }
      50% { box-shadow: 0 0 35px rgba(255,23,68,0.7), 0 0 60px rgba(255,23,68,0.2); }
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 800;
      line-height: 0.95;
      color: #fff;
      margin-bottom: 1.2rem;
      letter-spacing: -0.03em;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
      animation: heroTitleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes heroTitleIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.82rem;
      color: var(--muted2);
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .hero-meta-sep {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--muted);
    }

    .hero-rating {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(57,217,138,0.12);
      color: var(--green);
      border: 1px solid rgba(57,217,138,0.2);
      border-radius: 99px;
      padding: 3px 10px;
      font-weight: 700;
      font-size: 0.75rem;
    }

    .hero-overview {
      max-width: 520px;
      font-size: 0.95rem;
      line-height: 1.65;
      color: rgba(238,238,245,0.75);
      margin-bottom: 2rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-weight: 400;
    }

    .hero-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      color: #000;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.75rem 2rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.01em;
    }

    .btn-primary:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,255,255,0.2);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.75rem 1.75rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
      font-family: 'Outfit', sans-serif;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    /* Hero dots */
    .hero-dots {
      display: flex;
      gap: 6px;
      margin-top: 2rem;
      align-items: center;
    }

    .hero-dot {
      height: 3px;
      border-radius: 99px;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: none;
      width: 16px;
    }

    .hero-dot.active {
      background: var(--red);
      width: 36px;
      box-shadow: 0 0 10px var(--red-glow);
    }

    /* ══════════════════════════════ MAIN CONTENT ══════════════════════════════ */
    .main-content {
      padding: 0 0 5rem;
      position: relative;
      z-index: 5;
      margin-top: -10vh;
    }

    /* ── GENRE BAR ── */
    .genre-bar-wrap {
      padding: 0 4%;
      margin-bottom: 2.5rem;
    }

    .genre-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .genre-scroll::-webkit-scrollbar { display: none; }

    .genre-chip {
      flex-shrink: 0;
      padding: 7px 18px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted2);
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
      font-family: 'Outfit', sans-serif;
    }

    .genre-chip:hover {
      border-color: rgba(255,255,255,0.25);
      color: var(--text);
      background: rgba(255,255,255,0.08);
    }

    .genre-chip.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
      box-shadow: 0 2px 15px rgba(255,23,68,0.35);
    }

    /* ══════════════════════════════ ROW SECTIONS ══════════════════════════════ */
    .nfx-row-section {
      margin-bottom: 2.5rem;
      position: relative;
    }

    .nfx-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4%;
      margin-bottom: 1rem;
    }

    .nfx-row-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .nfx-row-title span { color: var(--red); }

    .nfx-row-tag {
      font-size: 0.55rem;
      background: linear-gradient(135deg, var(--red), var(--red2));
      color: #fff !important;
      padding: 3px 9px;
      border-radius: 99px;
      font-weight: 800;
      letter-spacing: 0.1em;
      box-shadow: 0 2px 8px rgba(255,23,68,0.35);
      animation: pulseBadge 2.5s ease-in-out infinite;
    }

    .see-all {
      font-size: 0.75rem;
      color: var(--muted2);
      text-decoration: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
    }

    .see-all:hover {
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    .nfx-row-wrap {
      position: relative;
      padding: 0 4%;
      overflow: visible;
    }

    .nfx-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      overflow-y: visible;
      scroll-behavior: smooth;
      scrollbar-width: none;
      padding: 3rem 0 3rem;
      margin: -3rem 0 -3rem;
    }

    .nfx-row::-webkit-scrollbar { display: none; }

    /* Row arrows */
    .nfx-row-arrow {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 60px;
      background: linear-gradient(90deg, rgba(8,8,16,0.95) 0%, transparent 100%);
      border: none;
      color: #fff;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      opacity: 0;
    }

    .nfx-row-arrow .arrow-btn {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
    }

    .nfx-row-arrow:hover .arrow-btn {
      background: rgba(255,23,68,0.7);
      border-color: var(--red);
      box-shadow: 0 0 20px var(--red-glow);
      transform: scale(1.1);
    }

    .nfx-row-wrap:hover .nfx-row-arrow { opacity: 1; }

    .nfx-row-arrow.left {
      left: 0;
      background: linear-gradient(90deg, rgba(8,8,16,0.95) 0%, transparent 100%);
    }

    .nfx-row-arrow.right {
      right: 0;
      background: linear-gradient(270deg, rgba(8,8,16,0.95) 0%, transparent 100%);
    }

    /* ══════════════════════════════ CARDS ══════════════════════════════ */
    .nfx-card {
      flex-shrink: 0;
      width: 185px;
      border-radius: 14px;
      overflow: visible;
      cursor: pointer;
      position: relative;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.35s ease, z-index 0s 0.35s;
    }

    .nfx-card-inner {
      border-radius: 14px;
      overflow: hidden;
      background: var(--surface);
      position: relative;
    }

    .nfx-card:hover {
      transform: scale(1.12) translateY(-8px);
      z-index: 100;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.35s ease, z-index 0s;
      box-shadow: 0 25px 60px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,23,68,0.3), 0 0 30px rgba(255,23,68,0.1);
    }

    .nfx-card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--surface2);
      transition: filter 0.35s;
    }

    .nfx-card:hover .nfx-card-poster { filter: brightness(0.75); }

    .nfx-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(8,8,16,0.98) 0%,
        rgba(8,8,16,0.5) 40%,
        transparent 70%
      );
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nfx-card:hover .nfx-card-overlay { opacity: 1; }

    .nfx-card-play {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--red), var(--red2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transform: scale(0) rotate(-90deg);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 20px rgba(255,23,68,0.5);
      position: absolute;
      top: 50%;
      left: 50%;
      margin: -24px 0 0 -24px;
    }

    .nfx-card:hover .nfx-card-play {
      transform: scale(1) rotate(0deg);
    }

    .nfx-card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.8rem;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      transform: translateY(6px);
    }

    .nfx-card:hover .nfx-card-info {
      opacity: 1;
      transform: translateY(0);
    }

    .nfx-card-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
      font-family: 'Syne', sans-serif;
      letter-spacing: -0.01em;
    }

    .nfx-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.65rem;
      color: var(--muted2);
    }

    .nfx-card-rating {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      color: var(--gold);
      font-weight: 700;
    }

    /* ── SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, rgba(255,255,255,0.04) 50%, var(--surface2) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.8s ease-in-out infinite;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .skeleton-card {
      border-radius: 14px;
      overflow: hidden;
      flex-shrink: 0;
      width: 185px;
      background: var(--surface);
    }

    .skeleton-poster { width: 100%; aspect-ratio: 2/3; }
    .skeleton-line { height: 11px; margin: 0.75rem 0.75rem 5px; width: 70%; }
    .skeleton-line-sm { height: 9px; width: 45%; margin: 0 0.75rem 0.75rem; }

    /* ══════════════════════════════ MODAL ══════════════════════════════ */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(16px) saturate(0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: 100%;
      max-width: 1100px;
      background: var(--dark2);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 95vh;
      animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 30px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.06);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.88) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.5rem;
      background: rgba(255,255,255,0.02);
      flex-shrink: 0;
      border-bottom: 1px solid var(--glass-border);
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(100% - 80px);
      letter-spacing: -0.02em;
    }

    .source-switcher { display: flex; gap: 6px; flex-shrink: 0; margin-left: 0.75rem; }

    .source-btn {
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--muted2);
      transition: all 0.2s;
      white-space: nowrap;
      font-family: 'Outfit', sans-serif;
    }

    .source-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

    .source-btn.active {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
      box-shadow: 0 2px 10px rgba(255,23,68,0.4);
    }

    .modal-close {
      width: 38px;
      height: 38px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted2);
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      background: rgba(255,23,68,0.15);
      border-color: rgba(255,23,68,0.4);
      color: var(--red);
    }

    .player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      flex-shrink: 0;
    }

    .player-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Episode bar */
    .episode-bar {
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255,255,255,0.02);
      flex-wrap: wrap;
      flex-shrink: 0;
      border-top: 1px solid var(--glass-border);
    }

    .ep-label {
      font-size: 0.75rem;
      color: var(--muted2);
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .ep-select {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      border-radius: 10px;
      padding: 7px 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ep-select:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255,23,68,0.12);
    }

    .ep-select option { background: var(--dark2); }

    /* ══════════════════════════════ TOAST ══════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 600;
      background: rgba(13,13,24,0.97);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 0.9rem 1.5rem;
      font-size: 0.82rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.03);
      transform: translateY(120px) scale(0.9);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      max-width: 340px;
    }

    .toast.show {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .toast-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--red-glow);
    }

    /* ══════════════════════════════ AUTH MODAL ══════════════════════════════ */
    .auth-backdrop {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .auth-backdrop.open { display: flex; }

    .auth-box {
      width: 100%;
      max-width: 410px;
      background: rgba(13,13,24,0.98);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      animation: modalIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.03);
      position: relative;
    }

    /* Red glow on auth box */
    .auth-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
    }

    .auth-header {
      padding: 2rem 2rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .auth-brand {
      font-family: 'Syne', sans-serif;
      font-size: 1.9rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.3rem;
      letter-spacing: -0.03em;
    }

    .auth-brand .w-accent { color: var(--red); text-shadow: 0 0 20px var(--red-glow); }

    .auth-sub {
      font-size: 0.78rem;
      color: var(--muted2);
      margin-bottom: 1.5rem;
      font-weight: 400;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }

    .auth-tab {
      flex: 1;
      padding: 0.5rem;
      border-radius: 9px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted2);
      transition: all 0.25s;
      font-family: 'Outfit', sans-serif;
    }

    .auth-tab.active {
      background: var(--red);
      color: #fff;
      box-shadow: 0 2px 12px rgba(255,23,68,0.4);
    }

    .auth-body { padding: 0 2rem 2rem; }

    .auth-field { margin-bottom: 1rem; }

    .auth-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted2);
      margin-bottom: 7px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .auth-input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: all 0.25s;
    }

    .auth-input:focus {
      border-color: rgba(255,23,68,0.5);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 0 3px rgba(255,23,68,0.1);
    }

    .auth-input::placeholder { color: rgba(107,107,136,0.6); }

    .auth-submit {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, var(--red), var(--red2));
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 0.5rem;
      font-family: 'Outfit', sans-serif;
      box-shadow: 0 4px 20px rgba(255,23,68,0.35);
      letter-spacing: 0.01em;
    }

    .auth-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,23,68,0.5);
    }

    .auth-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .auth-error {
      color: #ff6b6b;
      font-size: 0.78rem;
      margin-top: 0.75rem;
      text-align: center;
      min-height: 1.2em;
    }

    .auth-close {
      position: absolute;
      top: 1.1rem;
      right: 1.1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted2);
      transition: all 0.2s;
    }

    .auth-close:hover {
      background: rgba(255,23,68,0.15);
      color: var(--red);
    }

    /* ══════════════════════════════ HISTORY PANEL ══════════════════════════════ */
    .history-backdrop {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      display: none;
    }

    .history-backdrop.open { display: block; }

    .history-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 370px;
      max-width: 95vw;
      background: rgba(13,13,24,0.98);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255,255,255,0.07);
      z-index: 401;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -20px 0 60px rgba(0,0,0,0.5);
    }

    .history-panel.open { transform: translateX(0); }

    .history-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem;
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }

    .history-panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      color: #fff;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .history-panel-title span { color: var(--red); }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .history-item {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      padding: 0.65rem;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .history-item:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.07);
    }

    .history-poster {
      width: 44px;
      height: 66px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .history-info { flex: 1; min-width: 0; }

    .history-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .history-meta {
      font-size: 0.68rem;
      color: var(--muted2);
    }

    .history-delete {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .history-delete:hover {
      background: rgba(255,23,68,0.15);
      border-color: rgba(255,23,68,0.3);
      color: var(--red);
    }

    .history-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .history-clear-btn {
      margin: 0;
      padding: 1rem 1.5rem;
      background: rgba(255,23,68,0.08);
      border: none;
      border-top: 1px solid var(--glass-border);
      color: #ff6b6b;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Outfit', sans-serif;
      text-align: center;
    }

    .history-clear-btn:hover { background: rgba(255,23,68,0.15); }

    /* ══════════════════════════════ CONTINUE WATCHING ══════════════════════════════ */
    .continue-section {
      margin-bottom: 2.5rem;
      display: none;
    }

    .continue-section.has-items { display: block; }

    .continue-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0.5rem 4%;
    }

    .continue-row::-webkit-scrollbar { display: none; }

    .continue-card {
      flex-shrink: 0;
      width: 240px;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      position: relative;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid var(--glass-border);
    }

    .continue-card:hover {
      transform: scale(1.04) translateY(-4px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,23,68,0.25);
    }

    .continue-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
    }

    .continue-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .continue-card:hover .continue-thumb img { transform: scale(1.05); }

    .continue-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      opacity: 0;
      transition: opacity 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .continue-card:hover .continue-overlay { opacity: 1; }

    .continue-play-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--red), var(--red2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transform: scale(0.6);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 20px rgba(255,23,68,0.5);
    }

    .continue-card:hover .continue-play-icon { transform: scale(1); }

    .continue-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.1);
    }

    .continue-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--red2));
      border-radius: 0 2px 2px 0;
    }

    .continue-info { padding: 0.7rem 0.9rem; }

    .continue-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .continue-meta {
      font-size: 0.68rem;
      color: var(--muted2);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .continue-badge {
      background: rgba(255,23,68,0.15);
      border: 1px solid rgba(255,23,68,0.25);
      color: var(--red2);
      padding: 2px 7px;
      border-radius: 6px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .continue-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s;
      z-index: 2;
    }

    .continue-card:hover .continue-remove { opacity: 1; }

    .continue-remove:hover {
      background: rgba(255,23,68,0.7);
      border-color: var(--red);
    }

    .continue-nav { display: flex; gap: 0.5rem; }
    .continue-nav-btn { display: none; }

    /* ══════════════════════════════ EMPTY STATE ══════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--muted);
    }

    .empty-state h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      color: var(--text);
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    /* ══════════════════════════════ MOBILE BOTTOM NAV ══════════════════════════════ */
    .mobile-bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 300;
      background: rgba(8,8,16,0.97);
      backdrop-filter: blur(20px) saturate(1.5);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 0.6rem 0 max(0.6rem, env(safe-area-inset-bottom));
    }

    .mobile-bottom-nav-inner {
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .mobile-nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.25s;
      padding: 0.3rem 1rem;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
    }

    .mobile-nav-btn span {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .mobile-nav-btn.active,
    .mobile-nav-btn:hover {
      color: var(--red);
    }

    .mobile-nav-btn.active .mobile-icon-wrap {
      background: rgba(255,23,68,0.12);
    }

    .mobile-icon-wrap {
      width: 36px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      transition: background 0.25s;
    }

    /* ══════════════════════════════ MOBILE SEARCH ══════════════════════════════ */
    .mobile-search-bar {
      display: none;
      padding: 0.5rem 4% 0.75rem;
      background: rgba(8,8,16,0.97);
      border-bottom: 1px solid var(--glass-border);
    }

    .mobile-search-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0.65rem 1rem 0.65rem 2.5rem;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.3s;
    }

    .mobile-search-input:focus {
      border-color: rgba(255,23,68,0.5);
      box-shadow: 0 0 0 3px rgba(255,23,68,0.1);
    }

    .mobile-search-wrap {
      position: relative;
    }

    .mobile-search-icon {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    /* ══════════════════════════════ RESPONSIVE ══════════════════════════════ */
    @media (max-width: 900px) {
      .hero { height: 62vh; min-height: 420px; }
      .hero-content { padding: 0 4% 6vh; max-width: 100%; }
      .hero-title { font-size: clamp(2rem, 6vw, 3.5rem); }
      .hero-overview { -webkit-line-clamp: 2; }
      .nfx-card { width: 150px; }
      .skeleton-card { width: 150px; }
    }

    @media (max-width: 700px) {
      .nav-links { display: none; }
      .tab-group { display: none !important; }
      .search-wrap { display: none; }
      .btn-auth { display: none; }
      .mobile-bottom-nav { display: block; }
      .mobile-search-bar { display: block; }
      body { padding-bottom: 70px; }
      .nav-inner { height: 60px; padding: 0 4%; }
      .brand-logo { font-size: 1.35rem; }
      .hero { height: 55vh; min-height: 380px; }
      .hero-content { padding: 0 4% 7vh; }
      .hero-title { font-size: clamp(1.8rem, 5.5vw, 2.8rem); margin-bottom: 0.75rem; }
      .hero-overview { font-size: 0.85rem; -webkit-line-clamp: 2; }
      .hero-badge { font-size: 0.6rem; padding: 5px 12px; }
      .btn-primary, .btn-secondary { font-size: 0.82rem; padding: 0.6rem 1.3rem; }
      .btn-secondary { display: none; }
      .nfx-card { width: 120px; }
      .skeleton-card { width: 120px; }
      .nfx-card:hover { transform: scale(1.06) translateY(-4px); }
      .nfx-row-title { font-size: 1rem; }
      .genre-chip { font-size: 0.72rem; padding: 6px 13px; }
      .nfx-row-arrow { display: none; }
      .continue-card { width: 185px; }
      .modal { max-width: 100%; border-radius: 16px 16px 0 0; margin: 0; align-self: flex-end; }
      .modal-backdrop { padding: 0; align-items: flex-end; }
      .player-wrap { min-height: 180px; }
      .toast { bottom: 90px; right: 1rem; left: 1rem; max-width: 100%; }
    }

    @media (max-width: 400px) {
      .nfx-card { width: 100px; }
      .skeleton-card { width: 100px; }
      .hero-badge { display: none; }
      .continue-card { width: 160px; }
    }

    /* ══════════════════════════════ ANIMATIONS ══════════════════════════════ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fadeUp 0.6s cubic-bezier(0.34, 1.1, 0.64, 1) both;
    }

    /* Stagger children */
    .nfx-row-section:nth-child(1) { animation-delay: 0.05s; }
    .nfx-row-section:nth-child(2) { animation-delay: 0.12s; }
    .nfx-row-section:nth-child(3) { animation-delay: 0.2s; }

    /* Red line accents on rows */
    .nfx-row-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 1.15em;
      background: linear-gradient(180deg, var(--red), var(--red2));
      border-radius: 99px;
      margin-right: 0.5rem;
      box-shadow: 0 0 10px var(--red-glow);
      flex-shrink: 0;
    }

    /* Card number badge */
    .nfx-card-rank {
      position: absolute;
      top: 8px;
      left: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 0.6rem;
      font-weight: 800;
      color: #fff;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 2px 7px;
      letter-spacing: 0.04em;
      z-index: 1;
    }
  </style>
</head>

<!-- ═══════════════════════════════════ SCRIPT ═══════════════════════════════════ -->
<script>
  // ─── PARTICLES ───────────────────────────────────────────────────────────────
  (function spawnParticles() {
    const container = document.getElementById('particles');
    const colors = ['rgba(255,23,68,0.6)', 'rgba(255,69,105,0.4)', 'rgba(255,255,255,0.2)', 'rgba(255,23,68,0.3)'];
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      const size = 2 + Math.random() * 4;
      el.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${12 + Math.random() * 18}s;
        animation-delay: ${-Math.random() * 20}s;
        filter: blur(${Math.random() > 0.5 ? 1 : 0}px);
      `;
      container.appendChild(el);
    }
  })();

  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  const {
    TMDB_API_KEY,
    TMDB_BASE,
    IMG_BASE,
    SOURCES,
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  } = window.APP_CONFIG || {
    TMDB_API_KEY: '',
    TMDB_BASE: '',
    IMG_BASE: '',
    SOURCES: [{ name: 'VidKing', type: 'path', base: 'https://vidking.net/embed' }],
    SUPABASE_URL: '',
    SUPABASE_ANON_KEY: ''
  };

  let sbClient = null;
  let currentUser = null;

  function initSupabase() {
    try {
      const sb = window.supabase || window.Supabase;
      if (!sb || !sb.createClient) { console.warn('Supabase CDN not loaded'); return; }
      sbClient = sb.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      sbClient.auth.onAuthStateChange((_event, session) => {
        currentUser = session?.user ?? null;
        updateNavAuth();
      });
      sbClient.auth.getSession().then(({ data: { session } }) => {
        currentUser = session?.user ?? null;
        updateNavAuth();
      });
    } catch (e) { console.warn('Supabase init failed:', e); }
  }

  // ─── AUTH UI ─────────────────────────────────────────────────────────────────
  function updateNavAuth() {
    const guest = document.getElementById('navGuest');
    const user = document.getElementById('navUser');
    const mobileLabel = document.getElementById('mobileUserLabel');
    if (currentUser) {
      guest.style.display = 'none';
      user.style.display = 'block';
      const email = currentUser.email || '';
      const username = email.split('@')[0];
      document.getElementById('userEmail').textContent = username;
      document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();
      if (mobileLabel) mobileLabel.textContent = 'Profile';
    } else {
      guest.style.display = 'flex';
      user.style.display = 'none';
      if (mobileLabel) mobileLabel.textContent = 'Sign In';
    }
    lucide.createIcons();
    refreshContinueRow();
  }

  function openAuth(tab = 'login') {
    document.getElementById('authBackdrop').classList.add('open');
    switchAuthTab(tab);
    document.getElementById('loginError').textContent = '';
    document.getElementById('signupError').textContent = '';
    lucide.createIcons();
  }

  function closeAuth() {
    document.getElementById('authBackdrop').classList.remove('open');
  }

  function switchAuthTab(tab) {
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('authTabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('authTabSignup').classList.toggle('active', tab === 'signup');
  }

  async function doLogin() {
    if (!sbClient) return showToast('⚠ Supabase not configured.');
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!username) return;
    const email = `${username}@stream.vault`;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';
    btn.disabled = true; btn.textContent = 'Logging in…';
    const { error } = await sbClient.auth.signInWithPassword({ email, password });
    btn.disabled = false; btn.textContent = 'Log In';
    if (error) { errEl.textContent = error.message; return; }
    closeAuth();
    showToast('Welcome back!');
  }

  async function doSignup() {
    if (!sbClient) return showToast('⚠ Supabase not configured.');
    const username = document.getElementById('signupUsername').value.trim();
    const password = document.getElementById('signupPassword').value;
    if (!username) return;
    const email = `${username}@stream.vault`;
    const btn = document.getElementById('signupBtn');
    const errEl = document.getElementById('signupError');
    errEl.textContent = '';
    btn.disabled = true; btn.textContent = 'Creating account…';
    const { data, error } = await sbClient.auth.signUp({ email, password });
    if (error) {
      btn.disabled = false; btn.textContent = 'Create Account';
      errEl.textContent = error.message; return;
    }
    if (data?.session) {
      btn.disabled = false; btn.textContent = 'Create Account';
      closeAuth(); showToast('Account created!');
    } else {
      const { error: loginError } = await sbClient.auth.signInWithPassword({ email, password });
      btn.disabled = false; btn.textContent = 'Create Account';
      if (loginError) { errEl.textContent = 'Account created! Please log in.'; }
      else { closeAuth(); showToast('Account created successfully!'); }
    }
  }

  async function signOut() {
    toggleUserDropdown();
    if (!sbClient) return;
    await sbClient.auth.signOut();
    showToast('Signed out.');
  }

  function toggleUserDropdown() {
    document.getElementById('userDropdown').classList.toggle('open');
  }

  document.addEventListener('click', (e) => {
    const menu = document.getElementById('navUser');
    const dd = document.getElementById('userDropdown');
    if (dd && !menu?.contains(e.target)) dd.classList.remove('open');
  });

  // ─── MOBILE BOTTOM NAV ────────────────────────────────────────────────────────
  function setMobileActive(btn) {
    document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // ─── WATCH HISTORY ────────────────────────────────────────────────────────────
  async function saveToHistory(item) {
    if (!sbClient || !currentUser) return;
    const isTV = !!(item.first_air_date || (item.name && !item.title));
    await sbClient.from('watch_history').upsert({
      user_id: currentUser.id,
      tmdb_id: item.id,
      media_type: isTV ? 'tv' : 'movie',
      title: item.title || item.name || 'Unknown',
      poster_path: item.poster_path || null,
      watched_at: new Date().toISOString(),
    }, { onConflict: 'user_id,tmdb_id,media_type' });
    refreshContinueRow();
  }

  async function loadHistory() {
    if (!sbClient || !currentUser) return [];
    const { data, error } = await sbClient
      .from('watch_history')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('watched_at', { ascending: false })
      .limit(50);
    if (error) { console.error(error); return []; }
    return data || [];
  }

  async function deleteHistoryItem(id) {
    if (!sbClient || !currentUser) return;
    await sbClient.from('watch_history').delete().eq('id', id).eq('user_id', currentUser.id);
    openHistory();
  }

  async function clearHistory() {
    if (!sbClient || !currentUser) return;
    if (!confirm('Clear your entire watch history?')) return;
    await sbClient.from('watch_history').delete().eq('user_id', currentUser.id);
    openHistory();
  }

<div class="history-item" onclick="playFromHistory(${JSON.stringify(it).replace(/"/g, '&quot;')})">

  // ─── TMDB FETCH ───────────────────────────────────────────────────────────────
  async function tmdbFetch(endpoint, params = {}) {
    const key = TMDB_API_KEY.trim();
    const isToken = key.length > 60;
    let url = `${TMDB_BASE}/${endpoint}`;
    const options = { method: 'GET', headers: { 'Accept': 'application/json' } };
    if (isToken) { options.headers['Authorization'] = `Bearer ${key}`; }
    else { params['api_key'] = key; }
    const sParams = new URLSearchParams(params);
    if (!params.language) sParams.set('language', 'en-US');
    const query = sParams.toString();
    if (query) url += (url.includes('?') ? '&' : '?') + query;
    const res = await fetch(url, options);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.status_message || `HTTP ${res.status}`);
    }
    return await res.json();
  }

  // ─── SEARCH ──────────────────────────────────────────────────────────────────
  function setupSearch() {
    function handleSearch(q) {
      clearTimeout(searchTimeout);
      if (!q) { fetchAll(); return; }
      document.getElementById('heroSection').style.display = 'none';
      document.getElementById('topRatedSection').style.display = 'none';
      document.querySelector('#trendingSection .see-all').style.display = 'none';
      document.querySelector('#trendingSection .nfx-row-title').innerHTML = `Results for "<span>${escHtml(q)}</span>"`;
      showSkeletons('trendingRow', 12);
      searchTimeout = setTimeout(() => searchContent(q), 400);
    }

    const inp = document.getElementById('searchInput');
    inp.addEventListener('input', () => handleSearch(inp.value.trim()));

    const mobileInp = document.getElementById('mobileSearchInput');
    if (mobileInp) {
      mobileInp.addEventListener('input', () => handleSearch(mobileInp.value.trim()));
    }
  }

  function goHome(e) {
    if (e) e.preventDefault();
    document.getElementById('searchInput').value = '';
    const mobileInp = document.getElementById('mobileSearchInput');
    if (mobileInp) mobileInp.value = '';
    currentGenre = null;
    document.querySelectorAll('.genre-chip').forEach((c, i) => {
      c.classList.toggle('active', i === 0);
    });
    fetchAll();
  }

  async function searchContent(query) {
    const type = currentTab === 'movie' ? 'movie' : 'tv';
    try {
      const data = await tmdbFetch(`search/${type}`, { query, page: 1 });
      document.querySelector('#trendingSection .nfx-row-title').innerHTML = `Results for "<span>${escHtml(query)}</span>"`;
      renderRow('trendingRow', data.results || []);
    } catch (e) { showApiError(e); }
  }

  // ─── TAB SWITCH ──────────────────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    currentGenre = null;
    document.getElementById('searchInput').value = '';
    const mobileInp = document.getElementById('mobileSearchInput');
    if (mobileInp) mobileInp.value = '';
    document.getElementById('tabMovies').classList.toggle('active', tab === 'movie');
    document.getElementById('tabTV').classList.toggle('active', tab === 'tv');
    document.getElementById('navMovies').classList.toggle('active', tab === 'movie');
    document.getElementById('navTVLink').classList.toggle('active', tab === 'tv');
    document.getElementById('navHome').classList.remove('active');
    const label = tab === 'movie' ? 'Movies' : 'TV Shows';
    document.getElementById('sectionLabel').textContent = label;
    buildGenreBar();
    fetchAll();
    lucide.createIcons();
  }

  // ─── GENRE BAR ───────────────────────────────────────────────────────────────
  function buildGenreBar() {
    const genres = currentTab === 'movie' ? MOVIE_GENRES : TV_GENRES;
    const bar = document.getElementById('genreBar');
    bar.innerHTML = `<button class="genre-chip active" onclick="filterGenre(null, this)">All</button>` +
      genres.map(g => `<button class="genre-chip" onclick="filterGenre(${g.id}, this)">${g.name}</button>`).join('');
  }

  function filterGenre(id, el) {
    currentGenre = id;
    document.querySelectorAll('.genre-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    fetchAll();

  // ─── FETCH ALL ───────────────────────────────────────────────────────────────
  async function fetchAll() {
    document.getElementById('heroSection').style.display = 'flex';
    document.getElementById('topRatedSection').style.display = 'block';
    document.querySelector('#trendingSection .see-all').style.display = 'flex';
    const label = currentTab === 'movie' ? 'Movies' : 'TV Shows';
    document.querySelector('#trendingSection .nfx-row-title').innerHTML = `Trending <span id="sectionLabel">${label}</span> <span class="nfx-row-tag">HOT</span>`;
    showSkeletons('trendingRow', 12);
    showSkeletons('topRatedRow', 12);
    const type = currentTab;
    try {
      const [trending, topRated] = await Promise.all([
        fetchItems(`trending/${type}/week`),
        fetchItems(`${type}/top_rated`),
      ]);
      heroItems = trending.slice(0, 5);
      setupHero();
      const filtered = currentGenre
        ? items => items.filter(m => m.genre_ids?.includes(currentGenre))
        : items => items;
      renderRow('trendingRow', filtered(trending));
      renderRow('topRatedRow', filtered(topRated));
    } catch (e) { showApiError(e); }
  }

  async function fetchItems(endpoint) {
    try {
      const data = await tmdbFetch(endpoint, { page: 1 });
      return data.results || [];
    } catch (e) { return []; }
  }

  // ─── HERO ─────────────────────────────────────────────────────────────────────
  function setupHero() {
    if (!heroItems.length) return;
    buildHeroDots();
    showHeroItem(0);
    clearInterval(heroTimer);
    heroTimer = setInterval(() => {
      heroIndex = (heroIndex + 1) % heroItems.length;
      showHeroItem(heroIndex);
    }, 7000);
  }

  function buildHeroDots() {
    const dots = document.getElementById('heroDots');
    dots.innerHTML = heroItems.map((_, i) =>
      `<button class="hero-dot ${i === 0 ? 'active' : ''}" onclick="goHero(${i})"></button>`
    ).join('');
  }

  function goHero(i) {
    heroIndex = i;
    showHeroItem(i);
    clearInterval(heroTimer);
    heroTimer = setInterval(() => {
      heroIndex = (heroIndex + 1) % heroItems.length;
      showHeroItem(heroIndex);
    }, 7000);
  }

  function showHeroItem(i) {
    const item = heroItems[i];
    const bg = document.getElementById('heroBg');
    const title = item.title || item.name || 'Unknown';

    // Animate bg transition
    bg.classList.add('transitioning');
    setTimeout(() => {
      bg.style.backgroundImage = item.backdrop_path
        ? `url(${IMG_BASE}/original${item.backdrop_path})`
        : 'linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%)';
      bg.classList.remove('transitioning');
    }, 300);

    document.getElementById('heroTitle').textContent = title;
    document.getElementById('heroOverview').textContent = item.overview || 'No description available.';
    document.getElementById('heroRating').innerHTML = `<i data-lucide="star" style="width:11px;height:11px;fill:currentColor;"></i> ${item.vote_average?.toFixed(1) || '—'}`;
    document.getElementById('heroYear').textContent =
      (item.release_date || item.first_air_date || '').slice(0, 4) || '—';
    document.getElementById('heroGenre').textContent =
      currentTab === 'movie' ? 'Movie' : 'TV Show';
    document.querySelectorAll('.hero-dot').forEach((d, idx) => {
      d.classList.toggle('active', idx === i);
    });
    currentItem = item;
    lucide.createIcons();

  // ─── PLAYER / MODAL ──────────────────────────────────────────────────────────
  async function openPlayer(item) {
    if (typeof item === 'string') { try { item = JSON.parse(item); } catch (e) { return; } }
    currentItem = item;
    currentSourceIndex = 0;
    const isTV = !!(item.first_air_date || item.name && !item.title);
    const title = item.title || item.name;
    document.getElementById('modalTitle').textContent = title;
    buildSourceSwitcher();
    document.getElementById('playerModal').classList.add('open');
    document.body.style.overflow = 'hidden';
    saveToHistory(item);
    if (isTV) {
      document.getElementById('episodeBar').style.display = 'flex';
      await buildSeasonSelector(item.id);
    } else {
      document.getElementById('episodeBar').style.display = 'none';
      loadPlayerSrc(buildSourceUrl(item.id, false));
    }
    lucide.createIcons();
  }

  function closeModal() {
    document.getElementById('playerModal').classList.remove('open');
    document.getElementById('playerFrame').src = '';
    document.body.style.overflow = '';
  }

  function loadPlayerSrc(src) {
    document.getElementById('playerFrame').src = src;
  }

  function buildSourceSwitcher() {
    const container = document.getElementById('sourceSwitcher');
    container.innerHTML = SOURCES.map((s, i) =>
      `<button class="source-btn ${i === currentSourceIndex ? 'active' : ''}" onclick="switchSource(${i})">${s.name}</button>`
    ).join('');
  }

  function switchSource(index) {
    currentSourceIndex = index;
    buildSourceSwitcher();
    reloadCurrentPlayer();
  }

  function reloadCurrentPlayer() {
    if (!currentItem) return;
    const isTV = !!(currentItem.first_air_date || (currentItem.name && !currentItem.title));
    if (isTV) {
      const s = document.getElementById('seasonSelect').value;
      const e = document.getElementById('episodeSelect').value;
      loadPlayerSrc(buildSourceUrl(currentItem.id, true, s, e));
    } else {
      loadPlayerSrc(buildSourceUrl(currentItem.id, false));
    }
  }

  function buildSourceUrl(id, isTV, season, episode) {
    const src = SOURCES[currentSourceIndex];
    if (!src) return '';
    if (isTV) {
      if (src.type === 'segment') return `${src.base}/tv/${id}/season/${season}/episode/${episode}`;
      return `${src.base}/tv/${id}/${season}/${episode}`;
    }
    return `${src.base}/movie/${id}`;
  }

  // ─── TV SEASONS / EPISODES ────────────────────────────────────────────────────
  async function buildSeasonSelector(tvId) {
    const seasonSel = document.getElementById('seasonSelect');
    const episodeSel = document.getElementById('episodeSelect');
    seasonSel.innerHTML = `<option>Loading…</option>`;
    episodeSel.innerHTML = `<option>—</option>`;
    try {
      const data = await tmdbFetch(`tv/${tvId}`);
      tvSeasons = (data.seasons || []).filter(s => s.season_number > 0);
      seasonSel.innerHTML = tvSeasons.map(s =>
        `<option value="${s.season_number}">${s.name || 'Season ' + s.season_number}</option>`
      ).join('');
      await buildEpisodeSelector(tvId, tvSeasons[0]?.season_number || 1);
    } catch (e) {
      seasonSel.innerHTML = `<option value="1">Season 1</option>`;
      buildEpisodeSelector(tvId, 1);
    }
  }

  async function buildEpisodeSelector(tvId, seasonNum) {
    const episodeSel = document.getElementById('episodeSelect');
    episodeSel.innerHTML = `<option>Loading…</option>`;
    try {
      const data = await tmdbFetch(`tv/${tvId}/season/${seasonNum}`);
      const eps = data.episodes || [];
      episodeSel.innerHTML = eps.map(e =>
        `<option value="${e.episode_number}">Ep ${e.episode_number}: ${e.name || ''}</option>`
      ).join('');
      const ep = eps[0]?.episode_number || 1;
      loadPlayerSrc(buildSourceUrl(tvId, true, seasonNum, ep));
    } catch (e) {
      episodeSel.innerHTML = `<option value="1">Episode 1</option>`;
      loadPlayerSrc(buildSourceUrl(tvId, true, seasonNum, 1));
    }
  }

  async function onSeasonChange() {
    if (!currentItem) return;
    const s = document.getElementById('seasonSelect').value;
    await buildEpisodeSelector(currentItem.id, s);
  }

  function onEpisodeChange() {
    if (!currentItem) return;
    const s = document.getElementById('seasonSelect').value;
    const e = document.getElementById('episodeSelect').value;
    loadPlayerSrc(buildSourceUrl(currentItem.id, true, s, e));
  }

  // ─── LOAD MORE ────────────────────────────────────────────────────────────────
  async function loadMore() {
    showToast('Loading more content…');
    const type = currentTab;
    try {
      const data = await tmdbFetch(`trending/${type}/week`, { page: 2 });
      const row = document.getElementById('trendingRow');
      const currentCount = row.querySelectorAll('.nfx-card').length;
      const html = (data.results || []).map((item, idx) => cardHTML(item, currentCount + idx)).join('');
      row.insertAdjacentHTML('beforeend', html);
      lucide.createIcons();
    } catch (e) { showApiError(e); }
  }

  // ─── TOAST ───────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }

  function showApiError(err) {
    console.error('TMDB Error:', err);
    const msg = err?.message || 'Check API key configuration.';
    showToast(`⚠ ${msg}`);
    renderRow('trendingRow', []);
    renderRow('topRatedRow', []);
  }

  // ─── UTILITIES ────────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Close modal on backdrop click
  document.getElementById('playerModal').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeAuth(); closeHistory(); }
  });
</script>
</body>
</html>
